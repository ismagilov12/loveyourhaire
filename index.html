      if(!initSupabase()){
        console.warn("Supabase not available, working from localStorage");
        setSyncErr("Офлайн — база не підключена");
        setSynced(true);
        return;
      }
    }
    try{
      setSynced(false);setSyncErr("");

      // ─── STEP 1: flush any pending offline changes to DB before pulling ───
      const pending=PendingSync.get();
      if(Object.keys(pending).length>0){
        console.log("Flushing offline changes:",Object.keys(pending));
        const localO=LS.get("orders",[]),localP=LS.get("products",INIT_PRODUCTS),localC=LS.get("clients",[]),localE=LS.get("expenses",[]);
        const flushTasks=[];
        if(pending.orders&&localO.length)flushTasks.push(supabase.from("orders").upsert(localO.map(mapOrderToDB),{onConflict:"id"}).then(r=>{if(!r.error)PendingSync.clear("orders");else console.error("Flush orders failed",r.error);}));
        if(pending.products&&localP.length)flushTasks.push(supabase.from("products").upsert(localP,{onConflict:"id"}).then(r=>{if(!r.error)PendingSync.clear("products");else console.error("Flush products failed",r.error);}));
        if(pending.clients&&localC.length)flushTasks.push(supabase.from("clients").upsert(localC.map(mapClientToDB),{onConflict:"id"}).then(r=>{if(!r.error)PendingSync.clear("clients");else console.error("Flush clients failed",r.error);}));
        if(pending.expenses&&localE.length)flushTasks.push(supabase.from("expenses").upsert(localE,{onConflict:"id"}).then(r=>{if(!r.error)PendingSync.clear("expenses");else console.error("Flush expenses failed",r.error);}));
        if(flushTasks.length)await Promise.all(flushTasks);
      }

      // ─── STEP 2: pull fresh data from DB ───
      console.log("Loading data from Supabase...");
      const[pData,oData,cData,eData]=await Promise.all([
        DB.loadAll("products"),
        DB.loadAll("orders"),
        DB.loadAll("clients"),
        DB.loadAll("expenses"),
      ]);
      console.log("Supabase data:",{products:pData?.length,orders:oData?.length,clients:cData?.length,expenses:eData?.length});
      if(pData&&pData.length>0){
        const fixed=pData.map(p=>p.category==="Футболки"||p.category==="Oversize футболки"?{...p,cost:p.cost<450?450:p.cost}:p);
        const changed=fixed.filter((p,i)=>p.cost!==pData[i].cost);
        if(changed.length>0)DB.upsertMany("products",changed);
        setProducts(fixed);LS.set("products",fixed);
      }
      if(oData){
        const mapped=oData.map(mapOrderFromDB);
        // Merge:
        //  - Local-only orders (id not in DB) → keep + retry push
        //  - Orders in both: prefer local if local has TTN/toSend-status that DB lacks (save didn't persist)
        const cached=LS.get("orders",[]);
        const dbById=new Map(mapped.map(o=>[o.id,o]));
        const localOnly=cached.filter(o=>!dbById.has(o.id));
        const conflicts=[];// orders where local wins over DB
        const mergedWithConflictResolution=mapped.map(dbO=>{
          const locO=cached.find(o=>o.id===dbO.id);
          if(!locO)return dbO;
          // If local has TTN but DB doesn't, OR local status is later than DB status → keep local
          const localHasTtn=locO.ttn&&String(locO.ttn).trim().length>0;
          const dbHasTtn=dbO.ttn&&String(dbO.ttn).trim().length>0;
          const stagePref={new:0,studio:0,ttn:1,toSend:2,shipped:3,delivered:4,paid:5};
          const locRank=stagePref[locO.status]||0;
          const dbRank=stagePref[dbO.status]||0;
          if((localHasTtn&&!dbHasTtn)||(locRank>dbRank)){
            conflicts.push(locO);
            return locO;
          }
          return dbO;
        });
        if(conflicts.length>0){
          console.warn("Resolving "+conflicts.length+" local-over-DB conflicts (unpersisted TTN/status) — pushing to DB");
        }
        const finalList=localOnly.length>0?[...mergedWithConflictResolution,...localOnly]:mergedWithConflictResolution;
        setOrders(finalList);LS.set("orders",finalList);
        // Retry pushing any orders where local was preferred, plus local-only
        const toFlush=[...conflicts,...localOnly];
        if(toFlush.length>0&&supabase&&typeof supabase.from==="function"){
          try{supabase.from("orders").upsert(toFlush.map(mapOrderToDB),{onConflict:"id"}).then(r=>{if(r&&r.error){console.error("DB reconcile err",r.error);PendingSync.mark("orders");}else{console.log("DB reconcile: flushed "+toFlush.length+" orders");}}).catch(e=>{console.error("DB reconcile throw",e);PendingSync.mark("orders");});}
          catch(e){console.error("DB reconcile inner throw",e);PendingSync.mark("orders");}
        }
      }else{
        // oData is null — Supabase error; keep localStorage
        const cached=LS.get("orders",[]);
        if(cached.length>0){setOrders(cached);console.warn("Using cached orders:",cached.length);}
      }
      if(cData){
        const mapped=cData.map(mapClientFromDB);
        const cached=LS.get("clients",[]);
        const dbIds=new Set(mapped.map(c=>c.id));
        const localOnly=cached.filter(c=>!dbIds.has(c.id));
        const merged=localOnly.length>0?[...mapped,...localOnly]:mapped;
        if(localOnly.length>0)supabase.from("clients").upsert(localOnly.map(mapClientToDB),{onConflict:"id"}).then(r=>{if(r.error)PendingSync.mark("clients");});
        setClients(merged);LS.set("clients",merged);
      }
      if(eData){
        const cached=LS.get("expenses",[]);
        const dbIds=new Set(eData.map(e=>e.id));
        const localOnly=cached.filter(e=>!dbIds.has(e.id));
        const merged=localOnly.length>0?[...eData,...localOnly]:eData;
        if(localOnly.length>0)supabase.from("expenses").upsert(localOnly,{onConflict:"id"}).then(r=>{if(r.error)PendingSync.mark("expenses");});
        setExpenses(merged);LS.set("expenses",merged);
      }
      setSynced(true);setSyncErr("");
    }catch(e){console.error("Sync load error",e);setSyncErr("Помилка: "+e.message);setSynced(true);}
  };
  useEffect(()=>{
    if(user)doLoad();
  },[user]);

  // ─── React to supabase-ready event from background loader ───
  useEffect(()=>{
    if(!user)return;
    const onReady=()=>{console.log("supabase-ready event received, running doLoad");doLoad();};
    window.addEventListener("supabase-ready",onReady);
    return()=>window.removeEventListener("supabase-ready",onReady);
  },[user]);

  // ─── Realtime subscriptions ───
  const [sbReady,setSbReady]=useState(!!supabase);
  useEffect(()=>{
    const check=()=>setSbReady(!!supabase);
    window.addEventListener("supabase-ready",check);
    return()=>window.removeEventListener("supabase-ready",check);
  },[]);
  useEffect(()=>{
    if(!user||!supabase)return;
    if(typeof supabase.channel!=="function"){console.warn("realtime unavailable: supabase.channel missing — skipping subscription");return;}
    const rtUpdate=(setter,mapper)=>payload=>{
      fromRT.current=true;
      if(payload.eventType==="DELETE"){setter(prev=>{const next=prev.filter(x=>x.id!==payload.old.id);return next;});}
      else{const row=mapper?mapper(payload.new):payload.new;setter(prev=>{const idx=prev.findIndex(x=>x.id===row.id);let next;if(idx>=0){next=[...prev];next[idx]=row;}else{next=[...prev,row];}return next;});}
      setTimeout(()=>{fromRT.current=false;},100);
    };
    let channel;
    try{
      channel=supabase.channel("crm-realtime")
        .on("postgres_changes",{event:"*",schema:"public",table:"products"},rtUpdate(setProducts,null))
        .on("postgres_changes",{event:"*",schema:"public",table:"orders"},rtUpdate(setOrders,mapOrderFromDB))
        .on("postgres_changes",{event:"*",schema:"public",table:"clients"},rtUpdate(setClients,mapClientFromDB))
        .on("postgres_changes",{event:"*",schema:"public",table:"expenses"},rtUpdate(setExpenses,null))
        .subscribe();
    }catch(e){console.error("realtime setup failed:",e);return;}
    return()=>{try{if(supabase&&channel&&typeof supabase.removeChannel==="function")supabase.removeChannel(channel);}catch(e){console.warn("removeChannel failed:",e);}};
  },[user,sbReady]);

  // Persist to localStorage + Supabase on changes (skip if update came from realtime)
  // If supabase is offline, DB.upsertMany marks the table as pending-sync automatically.
  useEffect(()=>{LS.set("products",products);if(synced&&!fromRT.current){if(supabase)DB.upsertMany("products",products);else PendingSync.mark("products");}},[products]);
  useEffect(()=>{LS.set("orders",orders);if(synced&&!fromRT.current){if(supabase)DB.upsertMany("orders",orders.map(mapOrderToDB));else PendingSync.mark("orders");}},[orders]);
  useEffect(()=>{LS.set("clients",clients);if(synced&&!fromRT.current){if(supabase)DB.upsertMany("clients",clients.map(mapClientToDB));else PendingSync.mark("clients");}},[clients]);
  useEffect(()=>{LS.set("expenses",expenses);if(synced&&!fromRT.current){if(supabase)DB.upsertMany("expenses",expenses);else PendingSync.mark("expenses");}},[expenses]);

  const logout=()=>{LS.set("user",null);setUser(null);};

  if(!user) return <LoginPage onLogin={setUser}/>;

  const pages=[
    {id:"neworder",label:"Замовлення",icon:I.plus2,mob:"Нове"},
    {id:"orders",label:"Всі замовлення",icon:I.list,mob:"Список"},
    {id:"admin",label:"Товари",icon:I.bag,mob:"Товари"},
    {id:"clients",label:"Клієнти",icon:I.users,mob:"Клієнти"},
    {id:"expenses",label:"Витрати",icon:I.wallet,mob:"Витрати"},
    {id:"bulk",label:"Масове",icon:I.bulk,mob:"Масове"},
    {id:"dashboard",label:"Сводка",icon:I.dash,mob:"Сводка"},
  ];
  const todayOrders=orders.filter(o=>{const d=new Date(o.date),t=new Date();return sameDay(d,t);});
  const todayRev=todayOrders.reduce((s,o)=>s+o.total,0);
  const newCnt=orders.filter(o=>o.status==="new").length;

  return(<div className="app">
    <div className="sidebar">
      <div className="sidebar-logo">{I.scissors}<span>Love Your Haire</span></div>
      <nav className="sidebar-nav">{pages.map(p=><button key={p.id} className={`nav-item${page===p.id?' active':''}`} onClick={()=>setPage(p.id)}>{p.icon}<span>{p.label}</span>{p.id==="orders"&&newCnt>0&&<span className="nav-badge">{newCnt}</span>}</button>)}</nav>
      <div className="sidebar-stats">
        <div className="leopard-bg" style={{borderRadius:8,padding:"8px 10px",marginBottom:8}}>
          <div style={{fontSize:10,fontWeight:700,color:"#5a3a1a"}}>Сьогодні</div>
          <div style={{fontSize:16,fontWeight:800,color:"#2d1b1b"}}>{fmt(todayRev)}</div>
          <div style={{fontSize:10,color:"#5a3a1a"}}>{todayOrders.length} замовлень</div>
        </div>
        <div style={{padding:"8px 0",borderTop:"1px solid rgba(0,0,0,.1)",marginTop:8}}>
          <div style={{fontSize:11,color:"#5a3a1a"}}>{"\uD83D\uDC64"} {user.name}</div>
          <button onClick={logout} style={{background:"none",border:"none",color:"var(--pink2)",fontSize:11,cursor:"pointer",padding:"4px 0",textDecoration:"underline"}}>Вийти</button>
        </div>
      </div>
    </div>
    <div className="main">
      <div className="topbar">
        <h1>{pages.find(p=>p.id===page)?.label}</h1>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          {syncErr
            ?<span onClick={doLoad} style={{fontSize:11,color:"var(--red)",background:"var(--red-light)",padding:"2px 8px",borderRadius:6,cursor:"pointer"}} title="Натисніть для повторної спроби">{"\u26A0\uFE0F"} {syncErr} {" ↻"}</span>
            :!synced
            ?<span style={{fontSize:11,color:"var(--blue)",background:"var(--blue-light)",padding:"2px 8px",borderRadius:6}}>{"⏳ Завантаження..."}</span>
            :!supabase
            ?<span onClick={doLoad} style={{fontSize:11,color:"var(--gold)",background:"#fef3c7",padding:"2px 8px",borderRadius:6,cursor:"pointer"}} title="Supabase SDK не завантажився. Дані зберігаються лише локально! Натисніть для повторної спроби.">{"⚠️ Офлайн (тільки локально) ↻"}</span>
            :<span onClick={doLoad} style={{fontSize:11,color:"var(--green)",background:"var(--green-light)",padding:"2px 8px",borderRadius:6,cursor:"pointer"}} title="Натисніть для оновлення">{"☁️ Синхронізовано"}</span>
          }
          <span className="topbar-date">{new Date().toLocaleDateString("uk-UA",{weekday:"short",day:"numeric",month:"long"})}</span>
          <button onClick={logout} className="btn btn-sm btn-secondary" style={{fontSize:11,padding:"4px 10px"}}>Вийти</button>
        </div>
      </div>
      <div className="content">
        {page==="neworder"&&<NewOrderPage orders={orders} setOrders={setOrders} products={products} setProducts={setProducts} clients={clients} setClients={setClients}/>}
        {page==="orders"&&<OrdersListPage orders={orders} setOrders={setOrders} products={products}/>}
        {page==="admin"&&<AdminPage products={products} setProducts={setProducts}/>}
        {page==="clients"&&<ClientsPage clients={clients} orders={orders}/>}
        {page==="expenses"&&<ExpensesPage expenses={expenses} setExpenses={setExpenses}/>}
        {page==="bulk"&&<BulkImportPage orders={orders} setOrders={setOrders} products={products} clients={clients} setClients={setClients}/>}
        {page==="dashboard"&&<DashboardPage orders={orders} products={products} expenses={expenses} dateRange={dateRange} setDateRange={setDateRange}/>}
      </div>
    </div>
    {/* Mobile bottom nav */}
    <div className="mobile-nav"><div className="mobile-nav-inner">
      {pages.map(p=><button key={p.id} className={`mob-nav-btn${page===p.id?' active':''}`} onClick={()=>setPage(p.id)}>{p.icon}<span>{p.mob}</span></button>)}
    </div></div>
  </div>);
}

// ─── BOOT: render immediately from localStorage, init Supabase in background ───
function bootApp(){
  // Render app right away — App reads from LS and will sync when supabase becomes ready
  initSupabase(); // try immediately (no-op if SDK not ready yet)
  document.getElementById("boot-loader")?.remove();
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  // Keep trying to init supabase in background for up to 60s
  if(!supabase){
    let attempts=0;
    const poll=setInterval(()=>{
      attempts++;
      if(initSupabase()){
        clearInterval(poll);
        console.log("Supabase ready after "+attempts+" bg attempts");
        // Notify app that supabase is now available
        window.dispatchEvent(new CustomEvent("supabase-ready"));
      }else if(attempts>120){
        clearInterval(poll);
        console.warn("Supabase still not available after 60s, staying offline");
      }
    },500);
  }
}
bootApp();
// v19 — pin SDK to 2.33.0 + defensive realtime setup
</script>
</body>
</html>
