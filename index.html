function BulkImportPage({orders,setOrders,products,clients,setClients}){
  const[text,setText]=useState('');
  const[parsed,setParsed]=useState([]);
  const[step,setStep]=useState('input');
  const[addProd,setAddProd]=useState({});// {orderIdx: productId}

  const doParse=()=>{const r=parseBulkOrders(text,products);setParsed(r);setStep('review');};
  const upd=(idx,f,v)=>setParsed(p=>p.map((o,i)=>i===idx?{...o,[f]:v}:o));
  const rmOrder=idx=>setParsed(p=>p.filter((_,i)=>i!==idx));
  const rmItem=(oi,ii)=>setParsed(p=>p.map((o,i)=>{if(i!==oi)return o;const ni=o.items.filter((_,j)=>j!==ii);return{...o,items:ni,total:ni.reduce((s,x)=>s+x.price*x.qty,0)};}));
  const addItemTo=(oi)=>{
    const pid=addProd[oi];if(!pid)return;
    const p=products.find(x=>x.id===Number(pid));if(!p)return;
    setParsed(prev=>prev.map((o,i)=>{if(i!==oi)return o;
      const ex=o.items.find(x=>x.productId===p.id);
      let ni;if(ex)ni=o.items.map(x=>x.productId===p.id?{...x,qty:x.qty+1}:x);
      else ni=[...o.items,{productId:p.id,name:p.name,price:Number(p.price),cost:Number(p.cost||0),qty:1}];
      return{...o,items:ni,total:ni.reduce((s,x)=>s+x.price*x.qty,0)};
    }));
    setAddProd(prev=>({...prev,[oi]:''}));
  };

  const saveAll=()=>{
    const newOrders=[];const newClients=[];
    parsed.forEach((o,idx)=>{
      if(!o.name||!o.items.length)return;
      const total=o.items.reduce((s,i)=>s+i.price*i.qty,0);
      const totalCost=o.items.reduce((s,i)=>s+(i.cost||0)*i.qty,0);
      newOrders.push({id:Date.now()+idx*7,client:o.name,phone:o.phone,city:o.city,npBranch:o.branch,payment:o.payment,deliveryType:'np',items:[...o.items],total,totalCost,date:new Date().toISOString(),status:'new',ttn:''});
      if(o.phone&&!clients.find(c=>c.phone===o.phone)&&!newClients.find(c=>c.phone===o.phone)){
        newClients.push({id:Date.now()+idx*7+1,name:o.name,phone:o.phone,city:o.city,npBranch:o.branch,created:new Date().toISOString()});
      }
    });
    setOrders(prev=>[...prev,...newOrders]);
    if(newClients.length)setClients(prev=>[...prev,...newClients]);
    const nb=document.createElement("div");nb.textContent=`\u2705 Р”РҫРҙР°РҪРҫ ${newOrders.length} Р·Р°РјРҫРІР»РөРҪСҢ!`;Object.assign(nb.style,{position:"fixed",top:"20px",left:"50%",transform:"translateX(-50%)",background:"#22c55e",color:"#fff",padding:"12px 24px",borderRadius:"12px",fontSize:"15px",fontWeight:"600",zIndex:"9999",boxShadow:"0 4px 20px rgba(0,0,0,.25)"});document.body.appendChild(nb);setTimeout(()=>nb.remove(),3000);
    setText('');setParsed([]);setStep('input');
  };

  if(step==='input')return(<div style={{maxWidth:700,margin:"0 auto"}}>
    <div className="card" style={{marginBottom:16}}>
      <div className="card-header"><span className="card-title">РңР°СҒРҫРІРө Р·Р°РІР°РҪСӮР°Р¶РөРҪРҪСҸ Р·Р°РјРҫРІР»РөРҪСҢ</span></div>
      <p style={{fontSize:13,color:"var(--text2)",marginBottom:12}}>Р’СҒСӮР°РІСӮРө СҒРҝРёСҒРҫРә Р·Р°РјРҫРІР»РөРҪСҢ Р· РјРөСҒРөРҪРҙР¶РөСҖР°. РҡРҫР¶РҪРө Р·Р°РјРҫРІР»РөРҪРҪСҸ СҖРҫР·РҙС–Р»СҸР№СӮРө СҖРёСҒРәРҫСҺ (---) Р°РұРҫ РҝС–РҙРәСҖРөСҒР»РөРҪРҪСҸРј (___).</p>
      <textarea className="form-input" placeholder={"РҶРІР°РҪРҫРІР° РңР°СҖС–СҸ\n0931234567\nРҡРёС—РІ 321\nР•РјС–РҪРөРј СҖРҫР·РҫРІР°\nРһРҹРӣРҗР§Р•Рқ\n-----\nРқР°СҒСӮСғРҝРҪРө Р·Р°РјРҫРІР»РөРҪРҪСҸ..."} value={text} onChange={e=>setText(e.target.value)} rows={15} style={{fontSize:13,lineHeight:1.6,fontFamily:"monospace"}}/>
      <div style={{marginTop:12,display:"flex",gap:8}}>
        <button className="btn btn-primary" onClick={doParse} disabled={!text.trim()} style={{padding:"10px 24px"}}>{I.eye} Р РҫР·РҝС–Р·РҪР°СӮРё Р·Р°РјРҫРІР»РөРҪРҪСҸ</button>
        <button className="btn btn-secondary" onClick={()=>setText('')} disabled={!text.trim()}>РһСҮРёСҒСӮРёСӮРё</button>
      </div>
    </div>
  </div>);

  // Review step
  const validCount=parsed.filter(o=>o.name&&o.items.length).length;
  return(<div style={{maxWidth:800,margin:"0 auto"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
      <div>
        <h2 style={{fontSize:16,fontWeight:700,color:"var(--pink2)"}}>Р РҫР·РҝС–Р·РҪР°РҪРҫ {parsed.length} Р·Р°РјРҫРІР»РөРҪСҢ</h2>
        <span style={{fontSize:12,color:"var(--text2)"}}>{validCount} РіРҫСӮРҫРІС– РҙРҫ Р·РұРөСҖРөР¶РөРҪРҪСҸ В· РҹРөСҖРөРІС–СҖСӮРө РҙР°РҪС–</span>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button className="btn btn-secondary" onClick={()=>setStep('input')}>вҶҗ РқР°Р·Р°Рҙ</button>
        <button className="btn btn-primary" onClick={saveAll} disabled={!validCount}>Р—РұРөСҖРөРіСӮРё {validCount} Р·Р°РјРҫРІР»РөРҪСҢ</button>
      </div>
    </div>

    {parsed.map((o,idx)=>{const hasItems=o.items.length>0;const hasName=!!o.name;const ok=hasItems&&hasName;
    return(<div key={idx} className="card" style={{marginBottom:12,borderLeft:`3px solid var(--${ok?'green':'red'})`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:14,fontWeight:700,color:ok?"var(--green)":"var(--red)"}}>#{idx+1}</span>
          {!ok&&<span style={{fontSize:11,color:"var(--red)",background:"var(--red-light)",padding:"1px 8px",borderRadius:6}}>\u26A0\uFE0F {!hasName?"РқРөРјР°С” С–РјРөРҪС–":""}{!hasItems?"РқРөРјР°С” СӮРҫРІР°СҖСғ":""}</span>}
        </div>
        <button className="btn btn-danger btn-xs" onClick={()=>rmOrder(idx)}>{I.trash}</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        <div><label style={{fontSize:10,fontWeight:700,color:"var(--text2)"}}>РҶРј'СҸ</label><input className="form-input" value={o.name} onChange={e=>upd(idx,'name',e.target.value)} style={{fontSize:12,marginTop:2}}/></div>
        <div><label style={{fontSize:10,fontWeight:700,color:"var(--text2)"}}>РўРөР»РөС„РҫРҪ</label><input className="form-input" value={o.phone} onChange={e=>upd(idx,'phone',e.target.value)} style={{fontSize:12,marginTop:2}}/></div>
        <div><label style={{fontSize:10,fontWeight:700,color:"var(--text2)"}}>РңС–СҒСӮРҫ</label><input className="form-input" value={o.city} onChange={e=>upd(idx,'city',e.target.value)} style={{fontSize:12,marginTop:2}}/></div>
        <div><label style={{fontSize:10,fontWeight:700,color:"var(--text2)"}}>Р’С–РҙРҙС–Р»РөРҪРҪСҸ РқРҹ</label><input className="form-input" value={o.branch} onChange={e=>upd(idx,'branch',e.target.value)} style={{fontSize:12,marginTop:2}}/></div>
      </div>
      <div style={{marginBottom:8}}>
        <span style={{fontSize:10,fontWeight:700,color:"var(--text2)"}}>РўРһР’РҗР Рҳ</span>
        {o.items.map((it,j)=>(<div key={j} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",borderBottom:"1px solid var(--border)",fontSize:12}}>
          <span style={{flex:1,fontWeight:500}}>{it.name}</span>
          <input type="number" min="1" value={it.qty} onChange={e=>{const v=Math.max(1,Number(e.target.value));setParsed(p=>p.map((o2,i2)=>{if(i2!==idx)return o2;const ni=o2.items.map((x,k)=>k===j?{...x,qty:v}:x);return{...o2,items:ni,total:ni.reduce((s,x)=>s+x.price*x.qty,0)};}));}} style={{width:40,padding:"2px 4px",borderRadius:5,border:"1px solid var(--border)",fontSize:11,textAlign:"center"}}/>
          <span style={{color:"var(--text2)",fontSize:10}}>Г—</span>
          <input type="number" min="0" value={it.price} onChange={e=>{const v=Math.max(0,Number(e.target.value));setParsed(p=>p.map((o2,i2)=>{if(i2!==idx)return o2;const ni=o2.items.map((x,k)=>k===j?{...x,price:v}:x);return{...o2,items:ni,total:ni.reduce((s,x)=>s+x.price*x.qty,0)};}));}} style={{width:60,padding:"2px 4px",borderRadius:5,border:"1px solid var(--border)",fontSize:11,textAlign:"right"}}/>
          <span style={{fontSize:10}}>вӮҙ</span>
          <span style={{fontWeight:700,minWidth:50,textAlign:"right"}}>{fmt(it.price*it.qty)}</span>
          <button style={{background:"none",border:"none",color:"var(--red)",cursor:"pointer",fontSize:14,padding:"0 2px"}} onClick={()=>rmItem(idx,j)}>Г—</button>
        </div>))}
        <div style={{display:"flex",gap:4,marginTop:6,alignItems:"center"}}>
          <select className="form-input" value={addProd[idx]||''} onChange={e=>setAddProd(p=>({...p,[idx]:e.target.value}))} style={{fontSize:11,padding:"4px 6px",flex:1}}>
            <option value="">+ Р”РҫРҙР°СӮРё СӮРҫРІР°СҖ...</option>
            {products.map(p=><option key={p.id} value={p.id}>{p.name} вҖ” {fmt(Number(p.price))}</option>)}
          </select>
          <button className="btn btn-secondary btn-xs" onClick={()=>addItemTo(idx)} disabled={!addProd[idx]}>+</button>
        </div>
      </div>
      <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap",fontSize:12}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{color:"var(--text2)"}}>РһРҝР»Р°СӮР°:</span>
          <select className="form-input" value={o.payment} onChange={e=>upd(idx,'payment',e.target.value)} style={{fontSize:11,padding:"3px 6px",width:"auto"}}>
            <option value="cod">РқР°Р»РҫР¶РәР°</option>
            <option value="control">РһРҝР»Р°СҮРөРҪРҫ/РҹРөСҖРөРҙРҫРҝР»Р°СӮР°</option>
          </select>
        </div>
        {o.paid&&<span className="badge badge-green" style={{fontSize:10}}>РһРҝР»Р°СҮРөРҪРҫ{o.prepaid>0?` ${o.prepaid} вӮҙ`:''}</span>}
        {!o.paid&&o.prepaid>0&&<span className="badge badge-blue" style={{fontSize:10}}>РҹРөСҖРөРҙРҫРҝР»Р°СӮР° {o.prepaid} вӮҙ</span>}
        {o.items.length>0&&<span style={{fontWeight:700,marginLeft:"auto"}}>Р Р°Р·РҫРј: {fmt(o.items.reduce((s,x)=>s+x.price*x.qty,0))}</span>}
      </div>
      {o.notes&&o.notes.length>0&&<div style={{marginTop:6,fontSize:11,color:"var(--text2)",fontStyle:"italic"}}>{"\uD83D\uDCDD"} {o.notes.join(' В· ')}</div>}
    </div>);})}

    <div style={{marginTop:16,display:"flex",gap:8,justifyContent:"center",paddingBottom:40}}>
      <button className="btn btn-secondary" onClick={()=>setStep('input')}>вҶҗ РқР°Р·Р°Рҙ РҙРҫ СӮРөРәСҒСӮСғ</button>
      <button className="btn btn-primary" onClick={saveAll} disabled={!validCount} style={{padding:"10px 30px"}}>\u2705 Р—РұРөСҖРөРіСӮРё {validCount} Р·Р°РјРҫРІР»РөРҪСҢ</button>
    </div>
  </div>);
}

// в”Җв”Җв”Җ APP в”Җв”Җв”Җ
function App(){
  const[user,setUser]=useState(()=>LS.get("user",null));
  const[page,setPage]=useState("neworder");
  const[products,setProducts]=useState(()=>LS.get("products",INIT_PRODUCTS));
  const[orders,setOrders]=useState(()=>LS.get("orders",[]));
  const[clients,setClients]=useState(()=>LS.get("clients",[]));
  const[expenses,setExpenses]=useState(()=>LS.get("expenses",[]));
  const[dateRange,setDateRange]=useState(()=>{const t=new Date();t.setHours(0,0,0,0);return{start:t,end:t};});
  const[synced,setSynced]=useState(false);
  const[syncErr,setSyncErr]=useState("");
  const fromRT=useRef(false); // flag to skip sync-back on realtime events

  // в”Җв”Җв”Җ Load from Supabase on mount в”Җв”Җв”Җ
  useEffect(()=>{
    let cancelled=false;
    async function load(){
      try{
        const[pData,oData,cData,eData]=await Promise.all([
          DB.loadAll("products"),
          DB.loadAll("orders"),
          DB.loadAll("clients"),
          DB.loadAll("expenses"),
        ]);
        if(cancelled)return;
        if(pData&&pData.length>0){
          // One-time: update all t-shirt costs to 450
          const fixed=pData.map(p=>p.category==="РӨСғСӮРұРҫР»РәРё"||p.category==="Oversize С„СғСӮРұРҫР»РәРё"?{...p,cost:p.cost<450?450:p.cost}:p);
          const changed=fixed.filter((p,i)=>p.cost!==pData[i].cost);
          if(changed.length>0)DB.upsertMany("products",changed);
          setProducts(fixed);LS.set("products",fixed);
        }
        if(oData){const mapped=oData.map(mapOrderFromDB);setOrders(mapped);LS.set("orders",mapped);}
        if(cData){const mapped=cData.map(mapClientFromDB);setClients(mapped);LS.set("clients",mapped);}
        if(eData){setExpenses(eData);LS.set("expenses",eData);}
        setSynced(true);setSyncErr("");
      }catch(e){console.error("Sync load error",e);setSyncErr("РһС„Р»Р°Р№РҪ СҖРөР¶РёРј");setSynced(true);}
    }
    if(user)load();
    return()=>{cancelled=true;};
  },[user]);

  // в”Җв”Җв”Җ Realtime subscriptions в”Җв”Җв”Җ
  useEffect(()=>{
    if(!user||!supabase)return;
    const rtUpdate=(setter,mapper)=>payload=>{
      fromRT.current=true;
      if(payload.eventType==="DELETE"){setter(prev=>{const next=prev.filter(x=>x.id!==payload.old.id);return next;});}
      else{const row=mapper?mapper(payload.new):payload.new;setter(prev=>{const idx=prev.findIndex(x=>x.id===row.id);let next;if(idx>=0){next=[...prev];next[idx]=row;}else{next=[...prev,row];}return next;});}
      setTimeout(()=>{fromRT.current=false;},100);
    };
    const channel=supabase.channel("crm-realtime")
      .on("postgres_changes",{event:"*",schema:"public",table:"products"},rtUpdate(setProducts,null))
      .on("postgres_changes",{event:"*",schema:"public",table:"orders"},rtUpdate(setOrders,mapOrderFromDB))
      .on("postgres_changes",{event:"*",schema:"public",table:"clients"},rtUpdate(setClients,mapClientFromDB))
      .on("postgres_changes",{event:"*",schema:"public",table:"expenses"},rtUpdate(setExpenses,null))
      .subscribe();
    return()=>{if(supabase)supabase.removeChannel(channel);};
  },[user]);

  // Persist to localStorage + Supabase on changes (skip if update came from realtime)
  useEffect(()=>{LS.set("products",products);if(synced&&!fromRT.current)DB.upsertMany("products",products);},[products]);
  useEffect(()=>{LS.set("orders",orders);if(synced&&!fromRT.current)DB.upsertMany("orders",orders.map(mapOrderToDB));},[orders]);
  useEffect(()=>{LS.set("clients",clients);if(synced&&!fromRT.current)DB.upsertMany("clients",clients.map(mapClientToDB));},[clients]);
  useEffect(()=>{LS.set("expenses",expenses);if(synced&&!fromRT.current)DB.upsertMany("expenses",expenses);},[expenses]);

  const logout=()=>{LS.set("user",null);setUser(null);};

  if(!user) return <LoginPage onLogin={setUser}/>;

  const pages=[
    {id:"neworder",label:"Р—Р°РјРҫРІР»РөРҪРҪСҸ",icon:I.plus2,mob:"РқРҫРІРө"},
    {id:"orders",label:"Р’СҒС– Р·Р°РјРҫРІР»РөРҪРҪСҸ",icon:I.list,mob:"РЎРҝРёСҒРҫРә"},
    {id:"admin",label:"РўРҫРІР°СҖРё",icon:I.bag,mob:"РўРҫРІР°СҖРё"},
    {id:"clients",label:"РҡР»С–С”РҪСӮРё",icon:I.users,mob:"РҡР»С–С”РҪСӮРё"},
    {id:"expenses",label:"Р’РёСӮСҖР°СӮРё",icon:I.wallet,mob:"Р’РёСӮСҖР°СӮРё"},
    {id:"bulk",label:"РңР°СҒРҫРІРө",icon:I.bulk,mob:"РңР°СҒРҫРІРө"},
    {id:"dashboard",label:"РЎРІРҫРҙРәР°",icon:I.dash,mob:"РЎРІРҫРҙРәР°"},
  ];
  const todayOrders=orders.filter(o=>{const d=new Date(o.date),t=new Date();return sameDay(d,t);});
  const todayRev=todayOrders.reduce((s,o)=>s+o.total,0);
  const newCnt=orders.filter(o=>o.status==="new").length;

  return(<div className="app">
    <div className="sidebar">
      <div className="sidebar-logo">{I.scissors}<span>Love Your Haire</span></div>
      <nav className="sidebar-nav">{pages.map(p=><button key={p.id} className={`nav-item${page===p.id?' active':''}`} onClick={()=>setPage(p.id)}>{p.icon}<span>{p.label}</span>{p.id==="orders"&&newCnt>0&&<span className="nav-badge">{newCnt}</span>}</button>)}</nav>
      <div className="sidebar-stats">
        <div className="leopard-bg" style={{borderRadius:8,padding:"8px 10px",marginBottom:8}}>
          <div style={{fontSize:10,fontWeight:700,color:"#5a3a1a"}}>РЎСҢРҫРіРҫРҙРҪС–</div>
          <div style={{fontSize:16,fontWeight:800,color:"#2d1b1b"}}>{fmt(todayRev)}</div>
          <div style={{fontSize:10,color:"#5a3a1a"}}>{todayOrders.length} Р·Р°РјРҫРІР»РөРҪСҢ</div>
        </div>
        <div style={{padding:"8px 0",borderTop:"1px solid rgba(0,0,0,.1)",marginTop:8}}>
          <div style={{fontSize:11,color:"#5a3a1a"}}>{"\uD83D\uDC64"} {user.name}</div>
          <button onClick={logout} style={{background:"none",border:"none",color:"var(--pink2)",fontSize:11,cursor:"pointer",padding:"4px 0",textDecoration:"underline"}}>Р’РёР№СӮРё</button>
        </div>
      </div>
    </div>
    <div className="main">
      <div className="topbar">
        <h1>{pages.find(p=>p.id===page)?.label}</h1>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {syncErr
            ?<span style={{fontSize:11,color:"var(--red)",background:"var(--red-light)",padding:"2px 8px",borderRadius:6}}>{"\u26A0\uFE0F"} {syncErr}</span>
            :<span style={{fontSize:11,color:"var(--green)",background:"var(--green-light)",padding:"2px 8px",borderRadius:6}}>{"\u2601\uFE0F"} {"РЎРёРҪС…СҖРҫРҪС–Р·РҫРІР°РҪРҫ"}</span>
          }
          <span className="topbar-date">{new Date().toLocaleDateString("uk-UA",{weekday:"short",day:"numeric",month:"long"})}</span>
          <button onClick={logout} className="btn btn-sm btn-secondary" style={{fontSize:11,padding:"4px 10px"}}>Р’РёР№СӮРё</button>
        </div>
      </div>
      <div className="content">
        {page==="neworder"&&<NewOrderPage orders={orders} setOrders={setOrders} products={products} setProducts={setProducts} clients={clients} setClients={setClients}/>}
        {page==="orders"&&<OrdersListPage orders={orders} setOrders={setOrders}/>}
        {page==="admin"&&<AdminPage products={products} setProducts={setProducts}/>}
        {page==="clients"&&<ClientsPage clients={clients} orders={orders}/>}
        {page==="expenses"&&<ExpensesPage expenses={expenses} setExpenses={setExpenses}/>}
        {page==="bulk"&&<BulkImportPage orders={orders} setOrders={setOrders} products={products} clients={clients} setClients={setClients}/>}
        {page==="dashboard"&&<DashboardPage orders={orders} products={products} expenses={expenses} dateRange={dateRange} setDateRange={setDateRange}/>}
      </div>
    </div>
    {/* Mobile bottom nav */}
    <div className="mobile-nav"><div className="mobile-nav-inner">
      {pages.map(p=><button key={p.id} className={`mob-nav-btn${page===p.id?' active':''}`} onClick={()=>setPage(p.id)}>{p.icon}<span>{p.mob}</span></button>)}
    </div></div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</s
