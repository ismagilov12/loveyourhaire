      {ttnResult&&<div style={{padding:10,marginBottom:8,borderRadius:10,background:ttnResult.ok?"#dcfce7":"#fee2e2",border:"1px solid "+(ttnResult.ok?"#86efac":"#fca5a5"),fontSize:13}}>
        {ttnResult.ok?<><strong style={{color:"#166534"}}>{"✓ ТТН створено: "}</strong><span style={{fontFamily:"ui-monospace,monospace",fontSize:15,fontWeight:700,color:"#166534"}}>{ttnResult.ttn}</span>{ttnResult.cost&&<span style={{marginLeft:8,fontSize:11,color:"#166534"}}>{"• доставка "+ttnResult.cost+"₴"}</span>}</>:<><strong style={{color:"#991b1b"}}>{"✗ ТТН: "}</strong><span style={{color:"#991b1b",fontSize:11}}>{ttnResult.error}</span></>}
      </div>}
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <button className="btn btn-primary" onClick={()=>submit(false)} disabled={!items.length||!parsed.name.trim()||creatingTTN} style={{flex:1,height:40,fontSize:14}}>{I.send}{" Оформити"}</button>
        {deliv==="np"&&<button className="btn" onClick={()=>submit(true)} disabled={!items.length||!parsed.name.trim()||creatingTTN||!(npResolved&&npResolved.warehouseRef)} style={{flex:1,height:40,fontSize:13,background:(npResolved&&npResolved.warehouseRef)?"#22c55e":"#9ca3af",color:"#fff",border:0,borderRadius:10,fontWeight:700,cursor:(npResolved&&npResolved.warehouseRef)?"pointer":"not-allowed"}}>{creatingTTN?"⏳ ТТН...":"📦 Оформити + ТТН"}</button>}
      </div>
    </div>
  </div>);
}

// ─── ORDERS LIST ───
function OrdersListPage({orders,setOrders,products}){
  const[filter,setFilter]=useState("all");
  const[ttnSync,setTtnSync]=useState(null); // {running, done, total, updated} or null
  const[search,setSearch]=useState("");
  const[productFilter,setProductFilter]=useState("all");// "all" or product id
  const[sortDir,setSortDir]=useState("desc");// "desc" (newest first) or "asc" (oldest first)
  const[ttnM,setTtnM]=useState(null);
  const[ttnV,setTtnV]=useState("");
  const[editO,setEditO]=useState(null);// editing order copy
  const[addProdId,setAddProdId]=useState("");
  const[addProdQty,setAddProdQty]=useState(1);
  const[addProdPrice,setAddProdPrice]=useState("");
  const[editItems,setEditItems]=useState([]);
  const[createTTNOrder,setCreateTTNOrder]=useState(null);
  const[prepayO,setPrepayO]=useState(null);// quick prepayment order
  const[selectedIds,setSelectedIds]=useState(()=>new Set());
  const[bulkRunning,setBulkRunning]=useState(false);
  const[bulkResults,setBulkResults]=useState(null);// {total,done:[{id,client,ok,ttn?,err?}]}
  // Inline TTN creation states
  const[ttnCreating,setTtnCreating]=useState(false);
  const[ttnErr,setTtnErr]=useState("");
  const[ttnResult,setTtnResult]=useState(null);
  const[ttnSettings,setTtnSettings]=useState(false);
  const[ttnPayerDel,setTtnPayerDel]=useState("Recipient");
  const[ttnWeight,setTtnWeight]=useState("0.5");
  const[ttnDesc,setTtnDesc]=useState("");
  const[ttnSenderInfo,setTtnSenderInfo]=useState(null);
  const[ttnSenderLoading,setTtnSenderLoading]=useState(false);
  const[prepayV,setPrepayV]=useState("");
  const searched=useMemo(()=>{
    if(!search.trim())return orders;
    const q=search.trim().toLowerCase();
    return orders.filter(o=>{
      if(o.client&&o.client.toLowerCase().includes(q))return true;
      if(o.phone&&o.phone.includes(q))return true;
      if(o.city&&o.city.toLowerCase().includes(q))return true;
      if(o.ttn&&o.ttn.includes(q))return true;
      if(o.comment&&o.comment.toLowerCase().includes(q))return true;
      if(o.items&&o.items.some(i=>i.name&&i.name.toLowerCase().includes(q)))return true;
      if(String(o.id).includes(q))return true;
      return false;
    });
  },[orders,search]);
  const dupeMap=useMemo(()=>findDuplicates(orders),[orders]);
  const hasTtn=o=>o.ttn&&String(o.ttn).trim().length>0;
  // Apply product filter to searched results
  const byProduct=productFilter==="all"?searched:searched.filter(o=>(o.items||[]).some(it=>String(it.productId)===String(productFilter)||it.name===productFilter));
  const filtered=filter==="dupes"?byProduct.filter(o=>dupeMap.has(o.id)):(filter==="all"?byProduct:(filter==="ttn"?byProduct.filter(o=>o.deliveryType==="np"&&!hasTtn(o)&&o.status!=="shipped"&&o.status!=="delivered"&&o.status!=="paid"&&o.status!=="studio"):(filter==="toSend"?byProduct.filter(o=>hasTtn(o)&&o.status!=="shipped"&&o.status!=="delivered"):(filter==="new"?byProduct.filter(o=>o.status==="new"&&!hasTtn(o)):byProduct.filter(o=>o.status===filter)))));
  // Sort: when showing dupes — group by duplicate key then by date desc; otherwise use sortDir
  const dateSort=(a,b)=>{const d=new Date(b.date)-new Date(a.date);return sortDir==="asc"?-d:d;};
  const sorted=filter==="dupes"
    ?[...filtered].sort((a,b)=>{const ka=dupeMap.get(a.id)?.key||"";const kb=dupeMap.get(b.id)?.key||"";if(ka!==kb)return ka.localeCompare(kb);return dateSort(a,b);})
    :[...filtered].sort(dateSort);
  const np=searched.filter(o=>o.deliveryType==="np");
  const dupeCount=searched.filter(o=>dupeMap.has(o.id)).length;
  // TTN funnel: NP orders without TTN and not in final states
  const awaitingTtn=np.filter(o=>!hasTtn(o)&&o.status!=="shipped"&&o.status!=="delivered"&&o.status!=="paid"&&o.status!=="studio");
  // На відправку funnel: only TTN drafts in NP (StatusCode "1" == Нова).
  // If NP code is already known, require exactly "1". Otherwise fall back to internal status while code is being fetched.
  const readyToShip=searched.filter(o=>{
    if(!hasTtn(o))return false;
    if(o.npStatusCode)return o.npStatusCode==="1";
    return o.status==="new"||o.status==="ttn"||o.status==="toSend";
  });
  const counts={all:searched.length,new:np.filter(o=>o.status==="new"&&!hasTtn(o)).length,ttn:awaitingTtn.length,toSend:readyToShip.length,shipped:np.filter(o=>o.status==="shipped").length,atPost:np.filter(o=>o.status==="atPost").length,received:np.filter(o=>o.status==="received").length,refused:np.filter(o=>o.status==="refused").length,delivered:np.filter(o=>o.status==="delivered").length,studio:searched.filter(o=>o.status==="studio").length,paid:searched.filter(o=>o.status==="paid").length,dupes:dupeCount};
  const openTtn=o=>{setTtnM(o);setTtnV(o.ttn||"");};
  const saveTtn=()=>{if(!ttnM)return;const t=ttnV.trim();setOrders(orders.map(o=>o.id===ttnM.id?{...o,ttn:t,status:t?"toSend":"new"}:o));saveOrderField(ttnM.id,{ttn:t,status:t?"toSend":"new"});setTtnM(null);};
  const openPrepay=o=>{setPrepayO(o);setPrepayV(String(o.prepayment||""));};
  const savePrepay=()=>{
    if(!prepayO)return;
    const pp=Number(prepayV)||0;
    const cod=Math.max(0,prepayO.total-pp);
    setOrders(orders.map(o=>o.id===prepayO.id?{...o,prepayment:pp,codAmount:cod}:o));
    saveOrderField(prepayO.id,{prepayment:pp,cod_amount:cod});
    setPrepayO(null);
  };
  // Direct save to Supabase for single-field updates
  const saveOrderField=(id,fields)=>{
    // Immediately patch LS so the next page load has the latest values even if DB update fails
    try{const arr=LS.get("orders",[]);const idx=arr.findIndex(o=>o.id===id);if(idx>=0){arr[idx]={...arr[idx],...fields};LS.set("orders",arr);}}catch(e){console.error("LS patch err",e);}
    // Try DB update; if client not ready, mark pending so the next sync flushes it
    if(supabase&&typeof supabase.from==="function"){
      try{
        const q=supabase.from("orders").update(fields).eq("id",id);
        if(q&&typeof q.then==="function"){q.then(r=>{if(r&&r.error){console.error("DB save err",r.error);PendingSync.mark("orders");}}).catch(e=>{console.error("DB save throw",e);PendingSync.mark("orders");});}
      }catch(e){console.error("DB save inner throw",e);PendingSync.mark("orders");}
    }else{console.warn("saveOrderField: supabase not ready, pending");PendingSync.mark("orders");}
  };
  // Bulk TTN creation — processes selected orders sequentially, resolves city/warehouse, creates TTN, saves ttn+status
  const bulkCreateTTN=async()=>{
    const savedSW=LS.get("np_sender_wh")||{};
    const sender=await NP.getSenderInfo();
    if(!sender){alert("Не вдалося завантажити дані відправника НП. Перевірте API ключ.");return;}
    if(!savedSW.whRef&&!sender.address?.ref){alert("Спочатку створіть один ТТН вручну, щоб зафіксувати відділення відправника.");return;}
    const list=orders.filter(o=>selectedIds.has(o.id)&&o.deliveryType==="np"&&!o.ttn&&o.city&&o.npBranch&&o.client&&o.phone);
    if(!list.length){alert("Серед виділених немає замовлень, придатних до створення ТТН (потрібно: НП, без ТТН, є місто/відділення/ПІБ/телефон).");return;}
    setBulkRunning(true);
    setBulkResults({total:list.length,done:[]});
    let cargoRef="";try{cargoRef=await NP.getCargoDescriptionRef("одяг");}catch(e){}
    const results=[];
    let updated=[...orders];
    for(const o of list){
      const item={id:o.id,client:o.client,ok:false};
      try{
        // Resolve city
        const cities=await NP.searchCity(o.city);
        if(!cities.length)throw new Error("місто \""+o.city+"\" не знайдено");
        const want=NP._normCity(o.city);
        const byEx=cities.filter(x=>NP._normCity(x.city||"")===want||NP._normCity(x.name||"")===want);
        const byS=cities.filter(x=>NP._normCity(x.city||"").startsWith(want)||NP._normCity(x.name||"").startsWith(want));
        const pool=(byEx.length?byEx:(byS.length?byS:cities));
        const city=pool.find(x=>/\bм\./i.test(x.name||"")||x.settlementType==="М")||pool[0];
        // Resolve warehouse
        const branchStr=String(o.npBranch);
        const numM=branchStr.match(/\d+/);
        const branchNum=numM?numM[0]:branchStr;
        const isPost=/поштомат|почтомат|postomat/i.test(branchStr);
        let whs=await NP.getWarehouses(city.ref,branchNum);
        if(!whs.length)whs=await NP.getWarehouses(city.ref,branchStr);
        if(!whs.length)whs=await NP.getWarehouses(city.ref);
        if(!whs.length)throw new Error("відділень не знайдено в НП");
        const isPD=d=>/поштомат|postomat/i.test(d||"");
        let wh=null;
        if(isPost){
          wh=whs.find(w=>w.num===branchNum&&isPD(w.desc))
            ||whs.find(w=>isPD(w.desc)&&(w.desc||"").includes(branchNum))
            ||whs.find(w=>w.num===branchNum);
        }else{
          wh=whs.find(w=>w.num===branchNum&&!isPD(w.desc))
            ||whs.find(w=>w.num===branchNum);
        }
        if(!wh)wh=whs[0];
        if(!wh)throw new Error("відділення №"+branchNum+" не знайдено");
        // Create recipient
        const recip=await NP.createRecipient(o.client,o.phone,city.deliveryCityRef||city.ref);
        if(!recip.ok)throw new Error("отримувач: "+(recip.errors||[]).join(", "));
        // Amounts
        const prepay=o.prepayment||0;
        const cod=o.codAmount!=null?o.codAmount:Math.max(0,o.total-prepay);
        const payType=prepay>=o.total?"prepaid":"control";
        const payerDel="Recipient";
        const desc=(o.items||[]).map(i=>i.name+(i.qty>1?" x"+i.qty:"")).join(", ");
        const addInfo=desc+(o.comment?" | "+o.comment:"");
        const params={
          PayerType:payerDel,PaymentMethod:(payType==="control"&&payerDel==="Sender")?"NonCash":"Cash",
          CargoType:"Parcel",Weight:"0.5",ServiceType:"WarehouseWarehouse",SeatsAmount:"1",
          Description:desc||"Товар",Cost:String(o.total),
          CitySender:savedSW.cityRef||sender.address?.cityRef||"",
          Sender:sender.ref,SenderAddress:savedSW.whRef||sender.address?.ref||"",
          ContactSender:sender.contact?.ref||"",SendersPhone:sender.contact?.phone||"",
          CityRecipient:city.ref,RecipientAddress:wh.ref,
          Recipient:recip.ref,ContactRecipient:recip.contactRef,RecipientsPhone:o.phone,
          OptionsSeat:[{volumetricVolume:"1",volumetricWidth:"10",volumetricLength:"20",volumetricHeight:"10",weight:"0.5"}]
        };
        if(payType==="control"&&cod>0)params.AfterpaymentOnGoodsCost=String(cod);
        if(cargoRef)params.CargoDescription=cargoRef;
        if(addInfo.trim())params.AdditionalInformation=addInfo.trim().slice(0,99);
        const r=await NP.createTTN(params);
        if(!r.ok)throw new Error((r.errors||[]).join(", ")||"Помилка створення ТТН");
        item.ok=true;item.ttn=r.ttn;
        updated=updated.map(x=>x.id===o.id?{...x,ttn:r.ttn,status:"toSend"}:x);
        // Persist
        saveOrderField(o.id,{ttn:r.ttn,status:"toSend"});
      }catch(e){item.err=e.message||String(e);}
      results.push(item);
      setBulkResults({total:list.length,done:[...results]});
    }
    setOrders(updated);
    setBulkRunning(false);
    // Keep selection cleared for successful ones, preserve for failed ones so user can retry
    const okIds=new Set(results.filter(x=>x.ok).map(x=>x.id));
    setSelectedIds(prev=>{const n=new Set(prev);okIds.forEach(id=>n.delete(id));return n;});
  };
  const toggleSelect=(id)=>{setSelectedIds(prev=>{const n=new Set(prev);if(n.has(id))n.delete(id);else n.add(id);return n;});};
  const toggleSelectAll=()=>{const eligible=sorted.filter(o=>o.deliveryType==="np"&&!o.ttn).map(o=>o.id);const allSelected=eligible.every(id=>selectedIds.has(id));setSelectedIds(prev=>{const n=new Set(prev);if(allSelected)eligible.forEach(id=>n.delete(id));else eligible.forEach(id=>n.add(id));return n;});};
  const clearSelection=()=>setSelectedIds(new Set());
  const eligibleSelectedCount=()=>{let n=0;for(const o of orders){if(selectedIds.has(o.id)&&o.deliveryType==="np"&&!o.ttn&&o.city&&o.npBranch&&o.client&&o.phone)n++;}return n;};
  const updSt=(id,st)=>{setOrders(orders.map(o=>o.id===id?{...o,status:st}:o));saveOrderField(id,{status:st});};
  // In-memory only — stores raw NP tracking code per order (no DB column needed)
  const updNpCode=(id,code)=>{setOrders(prev=>prev.map(o=>o.id===id?{...o,npStatusCode:code}:o));};
  const doSyncTTN=async()=>{
    // Collect TTNs from orders that are not in manual-terminal states
    const locked=new Set(["paid","studio","delivered"]);
    const list=orders.filter(o=>o.ttn&&!locked.has(o.status)).map(o=>({id:o.id,ttn:String(o.ttn).trim(),status:o.status}));
    if(!list.length){setTtnSync({running:false,total:0,done:0,updated:0,msg:"Немає ТТН для оновлення"});setTimeout(()=>setTtnSync(null),3000);return;}
    setTtnSync({running:true,total:list.length,done:0,updated:0});
    let updated=0;
    // Batches of 100 (NP API max per request)
    const byTtn=new Map();list.forEach(x=>byTtn.set(x.ttn,x));
    const allTtns=[...byTtn.keys()];
    const results=[];
    for(let i=0;i<allTtns.length;i+=100){
      const chunk=allTtns.slice(i,i+100);
      try{const rs=await NP.trackTTNs(chunk);results.push(...rs);}catch(e){console.warn("trackTTNs batch failed",e);}
      setTtnSync(s=>s?{...s,done:Math.min(i+chunk.length,allTtns.length)}:s);
    }
    // Apply rule: update order status if mapping exists and different
    // Also always stash the raw NP statusCode on the order (in-memory) so filters (e.g. "На відправку") are strict.
    let nextOrders=orders;
    for(const r of results){
      const o=byTtn.get(r.ttn);
      if(!o)continue;
      const code=String(r.statusCode||"");
      const mapped=TTN_TO_ORDER_STATUS[code];
      nextOrders=nextOrders.map(x=>x.id===o.id?{...x,npStatusCode:code}:x);
      if(!mapped)continue;
      if(locked.has(o.status))continue;
      if(o.status===mapped)continue;
      nextOrders=nextOrders.map(x=>x.id===o.id?{...x,status:mapped}:x);
      try{saveOrderField(o.id,{status:mapped});}catch(e){}
      updated++;
    }
    setOrders(nextOrders);
    setTtnSync({running:false,total:list.length,done:list.length,updated});
    setTimeout(()=>setTtnSync(null),5000);
  };
  const inlinePrepay=(id,val)=>{const pp=Number(val)||0;setOrders(orders.map(o=>{if(o.id!==id)return o;const cod=Math.max(0,o.total-pp);return{...o,prepayment:pp,codAmount:cod};}));saveOrderField(id,{prepayment:pp,cod_amount:Math.max(0,(orders.find(o=>o.id===id)?.total||0)-pp)});};
  const openEdit=o=>{setEditO({...o});setEditItems(o.items.map(i=>({...i})));setAddProdId("");setAddProdQty(1);setAddProdPrice("");};
  const addEditItem=()=>{
    const p=products.find(x=>x.id===Number(addProdId));if(!p)return;
    const finalPrice=addProdPrice!==""?Number(addProdPrice):p.price;
    const ex=editItems.find(i=>i.productId===p.id);
    if(ex)setEditItems(editItems.map(i=>i.productId===p.id?{...i,qty:i.qty+addProdQty,price:finalPrice}:i));
    else setEditItems([...editItems,{productId:p.id,name:p.name,price:finalPrice,cost:p.cost,qty:addProdQty,type:p.type}]);
    setAddProdId("");setAddProdQty(1);setAddProdPrice("");
  };
  const saveEdit=()=>{
    if(!editO)return;
    const total=editItems.reduce((s,i)=>s+i.price*i.qty,0);
    const totalCost=editItems.reduce((s,i)=>s+i.cost*i.qty,0);
    setOrders(orders.map(o=>o.id===editO.id?{...editO,items:editItems,total,totalCost}:o));
    setEditO(null);
  };
  const rmEditItem=idx=>setEditItems(editItems.filter((_,i)=>i!==idx));
  const updEditItem=(idx,field,val)=>setEditItems(editItems.map((it,i)=>i===idx?{...it,[field]:val}:it));

  // Reset inline TTN state when editO changes
  useEffect(()=>{
    if(editO){
      setTtnErr("");setTtnResult(null);setTtnCreating(false);setTtnSettings(false);
      setTtnPayerDel("Recipient");setTtnWeight("0.5");
      setTtnDesc(editO.items?(editO.items.map(i=>i.name+(i.qty>1?" x"+i.qty:"")).join(", ")+(editO.comment?" | "+editO.comment:"")):"");
      // Preload sender info
      if(editO.deliveryType==="np"&&!editO.ttn&&!ttnSenderInfo){
        setTtnSenderLoading(true);
        NP.getSenderInfo().then(s=>{setTtnSenderInfo(s);setTtnSenderLoading(false);}).catch(()=>setTtnSenderLoading(false));
      }
    }
  },[editO?.id]);

  const doInlineTTN=async()=>{
    if(!editO)return;
    if(!ttnSenderInfo){setTtnErr("Дані відправника не завантажені");return;}
    if(!editO.city||!editO.npBranch){setTtnErr("Не вказано місто або відділення");return;}
    if(!editO.client||!editO.phone){setTtnErr("Не вказано ПІБ або телефон");return;}
    setTtnCreating(true);setTtnErr("");
    try{
      // 1. Resolve city — smart match (handles RU spellings, prefixes, multiple matches)
      const cities=await NP.searchCity(editO.city);
      if(!cities.length){setTtnCreating(false);setTtnErr("Місто не знайдено в НП");return;}
      const wantCity=NP._normCity(editO.city);
      const byEx=cities.filter(x=>NP._normCity(x.city||"")===wantCity||NP._normCity(x.name||"")===wantCity);
      const byS=cities.filter(x=>NP._normCity(x.city||"").startsWith(wantCity)||NP._normCity(x.name||"").startsWith(wantCity));
      const bySb=cities.filter(x=>NP._normCity(x.city||"").includes(wantCity));
      const poolC=(byEx.length?byEx:(byS.length?byS:(bySb.length?bySb:cities)));
      const cityTypedIn=poolC.find(x=>/\bм\./i.test(x.name||"")||(x.settlementType==="М"));
      const city=cityTypedIn||poolC[0];
      // 2. Resolve warehouse — extract number from strings like "поштомат 6850"
      const branchStr=String(editO.npBranch);
      const numMatch=branchStr.match(/\d+/);
      const branchNum=numMatch?numMatch[0]:branchStr;
      const isPoshtomat=/поштомат|почтомат|postomat/i.test(branchStr);
      let whs=await NP.getWarehouses(city.ref,branchNum);
      if(!whs||whs.length===0){whs=await NP.getWarehouses(city.ref,branchStr);}
      if(!whs||whs.length===0){whs=await NP.getWarehouses(city.ref);}
      const isPostDesc=d=>/поштомат|postomat/i.test(d||"");
      let wh=null;
      if(isPoshtomat){
        wh=whs.find(w=>w.num===branchNum&&isPostDesc(w.desc))
         ||whs.find(w=>isPostDesc(w.desc)&&(w.desc||"").includes(branchNum))
         ||whs.find(w=>w.num===branchNum);
      }else{
        wh=whs.find(w=>w.num===branchNum&&!isPostDesc(w.desc))
         ||whs.find(w=>w.num===branchNum);
      }
      if(!wh)wh=whs[0];
      if(!wh){setTtnCreating(false);setTtnErr("Відділення не знайдено");return;}
      // 3. Create recipient
      const recip=await NP.createRecipient(editO.client,editO.phone,city.deliveryCityRef||city.ref);
      if(!recip.ok){setTtnCreating(false);setTtnErr("Помилка отримувача: "+(recip.errors||[]).join(", "));return;}
      // 4. Calc amounts
      const savedSW=LS.get("np_sender_wh")||{};
      const prepay=editO.prepayment||0;
      const total=editItems.reduce((s,i)=>s+i.price*i.qty,0);
      const cod=editO.codAmount!=null?editO.codAmount:Math.max(0,total-prepay);
      const payType=prepay>=total?"prepaid":"control";
      // 5. Build params
      const params={
        PayerType:ttnPayerDel,PaymentMethod:(payType==="control"&&ttnPayerDel==="Sender")?"NonCash":"Cash",
        CargoType:"Parcel",Weight:ttnWeight,ServiceType:"WarehouseWarehouse",SeatsAmount:"1",
        Description:ttnDesc,Cost:String(total),
        CitySender:savedSW.cityRef||ttnSenderInfo.address?.cityRef||"",
        Sender:ttnSenderInfo.ref,SenderAddress:savedSW.whRef||ttnSenderInfo.address?.ref||"",
        ContactSender:ttnSenderInfo.contact?.ref||"",SendersPhone:ttnSenderInfo.contact?.phone||"",
        CityRecipient:city.ref,RecipientAddress:wh.ref,
        Recipient:recip.ref,ContactRecipient:recip.contactRef,RecipientsPhone:editO.phone,
      };
      if(payType==="control"&&cod>0){params.AfterpaymentOnGoodsCost=String(cod);}
      // CargoDescription expects a Ref — fetch "Одяг" category ref
      try{const cdRef=await NP.getCargoDescriptionRef("одяг");if(cdRef)params.CargoDescription=cdRef;}catch(e){}
      // User-edited ttnDesc is authoritative — don't auto-append comment (breaks manual shortening)
      const addInfo2=(ttnDesc||"").trim();
      if(addInfo2)params.AdditionalInformation=addInfo2.slice(0,99);
      params.OptionsSeat=[{volumetricVolume:"1",volumetricWidth:"10",volumetricLength:"20",volumetricHeight:"10",weight:String(ttnWeight||"0.5")}];
      // 6. Create TTN
      const r=await NP.createTTN(params);
      setTtnCreating(false);
      if(r.ok){
        setTtnResult(r);
        const upd={...editO,ttn:r.ttn,status:"toSend"};
        setEditO(upd);
        setOrders(orders.map(o=>o.id===editO.id?{...upd,items:editItems,total,totalCost:editItems.reduce((s,i)=>s+i.cost*i.qty,0)}:o));
      }else{setTtnErr((r.errors||[]).join(", ")||"Помилка створення");}
    }catch(e){setTtnCreating(false);setTtnErr("Помилка: "+e.message);}
  };

  return(<div>
    <div style={{position:"relative",marginBottom:12}}>
      <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Пошук: ім'я, телефон, місто, ТТН, товар..." style={{width:"100%",padding:"10px 14px 10px 36px",borderRadius:10,border:"1px solid var(--border)",fontSize:13,background:"var(--surface)",outline:"none"}}/>
      <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:15,opacity:.4}}>&#128269;</span>
      {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",fontSize:16,cursor:"pointer",opacity:.5}}>&times;</button>}
    </div>
    <div className="filter-pills" style={{marginBottom:16}}>
      <button className={`filter-pill${filter==="all"?' active':''}`} onClick={()=>setFilter("all")}>Всі ({counts.all})</button>
      <button className={`filter-pill${filter==="new"?' active':''}`} onClick={()=>setFilter("new")}>Нові ({counts.new})</button>
      <button className={`filter-pill${filter==="ttn"?' active':''}`} onClick={()=>setFilter("ttn")}>ТТН ({counts.ttn})</button>
      <button className={`filter-pill${filter==="toSend"?' active':''}`} onClick={()=>setFilter("toSend")}>На відправку ({counts.toSend})</button>
      <button className={`filter-pill${filter==="shipped"?' active':''}`} onClick={()=>setFilter("shipped")}>Відправ. ({counts.shipped})</button>
      <button className={`filter-pill${filter==="atPost"?' active':''}`} onClick={()=>setFilter("atPost")} style={{color:filter==="atPost"?"#856404":""}}>На пошті ({counts.atPost})</button>
      <button className={`filter-pill${filter==="received"?' active':''}`} onClick={()=>setFilter("received")} style={{color:filter==="received"?"var(--green)":""}}>Отримано ({counts.received})</button>
      <button className={`filter-pill${filter==="refused"?' active':''}`} onClick={()=>setFilter("refused")} style={{color:filter==="refused"?"var(--red)":""}}>Відмова ({counts.refused})</button>
      <button className={`filter-pill${filter==="delivered"?' active':''}`} onClick={()=>setFilter("delivered")}>Достав. ({counts.delivered})</button>
      <button className={`filter-pill${filter==="paid"?' active':''}`} onClick={()=>setFilter("paid")} style={{color:filter==="paid"?"var(--green)":""}}>Оплач. ({counts.paid})</button>
      <button className={`filter-pill${filter==="studio"?' active':''}`} onClick={()=>setFilter("studio")}>Студія ({counts.studio})</button>
      {dupeCount>0&&<button className={`filter-pill${filter==="dupes"?' active':''}`} onClick={()=>setFilter("dupes")} style={{color:filter==="dupes"?"#fff":"var(--red)",background:filter==="dupes"?"var(--red)":"",borderColor:"var(--red)",fontWeight:700}} title="Замовлення від одного клієнта в межах 7 днів">⚠ Дублі ({dupeCount})</button>}
      <button className="filter-pill" onClick={doSyncTTN} disabled={!!(ttnSync&&ttnSync.running)} style={{color:"var(--np-red)",borderColor:"var(--np-red)",fontWeight:700}} title="Запитати статуси ТТН у Нової Пошти і застосувати правило воронки">
        {ttnSync&&ttnSync.running?`⟳ ${ttnSync.done}/${ttnSync.total}`:(ttnSync&&!ttnSync.running?`✓ оновлено ${ttnSync.updated}`:"⟳ Оновити ТТН")}
      </button>
    </div>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexWrap:"wrap"}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontSize:11,color:"var(--text2)",fontWeight:600}}>{"Товар:"}</span>
        <select value={productFilter} onChange={e=>setProductFilter(e.target.value)} style={{padding:"6px 10px",borderRadius:8,border:"1px solid var(--border)",fontSize:12,background:"#fff",cursor:"pointer",maxWidth:240}}>
          <option value="all">{"Всі товари"}</option>
          {products.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        {productFilter!=="all"&&<button onClick={()=>setProductFilter("all")} style={{background:"none",border:"none",fontSize:14,cursor:"pointer",opacity:.6,padding:"2px 4px"}} title="Скинути фільтр товару">{"×"}</button>}
      </div>
      <button onClick={()=>setSortDir(d=>d==="desc"?"asc":"desc")} style={{padding:"6px 10px",borderRadius:8,border:"1px solid var(--border)",fontSize:12,background:"#fff",cursor:"pointer",fontWeight:600,display:"flex",alignItems:"center",gap:4}} title={sortDir==="desc"?"Новіші спочатку":"Старіші спочатку"}>
        <span>{"Дата"}</span><span style={{fontSize:10}}>{sortDir==="desc"?"↓":"↑"}</span>
      </button>
    </div>
    {selectedIds.size>0&&<div style={{background:"var(--np-light)",border:"1px solid var(--np-red)",borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
      <div style={{fontSize:13,fontWeight:600}}>{"Виділено: "}<span style={{color:"var(--np-red)"}}>{selectedIds.size}</span>{" (придатні до ТТН: "}{eligibleSelectedCount()}{")"}</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <button className="btn btn-np" style={{padding:"6px 14px",fontSize:12,fontWeight:700}} onClick={bulkCreateTTN} disabled={bulkRunning||eligibleSelectedCount()===0}>{bulkRunning?"Створюю...":"Створити ТТН масово"}</button>
        <button className="btn btn-secondary" style={{padding:"6px 14px",fontSize:12}} onClick={clearSelection} disabled={bulkRunning}>{"Скасувати виділення"}</button>
      </div>
    </div>}
    {filter==="dupes"&&dupeCount>0&&<div style={{background:"#fef3c7",border:"1px solid #f59e0b",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#78350f"}}>
      ⚠ Знайдено {dupeCount} можливих дублі ({new Set(Array.from(dupeMap.values()).map(v=>v.key)).size} груп). Показані замовлення, у яких той самий телефон або ім'я зустрічається більше одного разу протягом 7 днів. Перевірте їх перед відправкою ТТН.
    </div>}
    {sorted.length===0?<div className="empty-state"><p>Немає замовлень</p></div>:<>
    {/* Desktop table */}
    <div className="desktop-tbl card" style={{padding:0,overflowX:"auto"}}>
      <table className="tbl"><thead><tr><th style={{width:32,textAlign:"center"}}><input type="checkbox" title="Виділити всі без ТТН" checked={sorted.filter(o=>o.deliveryType==="np"&&!o.ttn).length>0&&sorted.filter(o=>o.deliveryType==="np"&&!o.ttn).every(o=>selectedIds.has(o.id))} onChange={toggleSelectAll} style={{cursor:"pointer"}}/></th><th>Дата</th><th>Клієнт</th><th>Тел</th><th>Товари</th><th>Доставка</th><th>Сума</th><th>Передопл</th><th>ТТН</th><th>Статус</th><th></th></tr></thead><tbody>
        {sorted.map(o=>{const dupe=dupeMap.get(o.id);const dupeOthers=dupe?dupe.groupIds.filter(x=>x!==o.id):[];const canSel=o.deliveryType==="np"&&!o.ttn;return(<tr key={o.id} style={{...(dupe?{background:"#fef3c7"}:null),...(selectedIds.has(o.id)?{background:"#fce7f3"}:null)}}>
          <td style={{textAlign:"center"}}>{canSel?<input type="checkbox" checked={selectedIds.has(o.id)} onChange={()=>toggleSelect(o.id)} style={{cursor:"pointer"}}/>:<span style={{fontSize:14,opacity:.3}}>{"·"}</span>}</td>
          <td style={{whiteSpace:"nowrap",fontSize:12}}>{new Date(o.date).toLocaleDateString("uk-UA")}</td>
          <td><div style={{fontWeight:600,display:"flex",alignItems:"center",gap:4}}>{o.client}{dupe&&<span title={`Можливий дубль — ще ${dupeOthers.length} замовл. від цього клієнта за останні 7 днів`} style={{background:"var(--red)",color:"#fff",fontSize:9,padding:"2px 6px",borderRadius:8,fontWeight:700,whiteSpace:"nowrap"}}>⚠ ДУБЛЬ ×{dupe.groupIds.length}</span>}</div>{o.comment&&<div style={{fontSize:10,color:"var(--text2)",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={o.comment}>{o.comment}</div>}</td>
          <td style={{fontSize:12,color:"var(--text2)"}}>{o.phone||"—"}</td>
          <td style={{fontSize:11,maxWidth:200}}>{o.items.map((it,i)=><span key={i}>{it.name}{it.qty>1?` ×${it.qty}`:""}{i<o.items.length-1?", ":""}</span>)}</td>
          <td style={{fontSize:11}}>{o.deliveryType==="np"?`${o.city}${o.npBranch?` №${o.npBranch}`:""}`:<span style={{color:"var(--pink2)"}}>Студія</span>}</td>
          <td style={{fontWeight:700}}>{fmt(o.total)}</td>
          <td><input type="number" min="0" defaultValue={o.prepayment||""} placeholder="0" onBlur={e=>inlinePrepay(o.id,e.target.value)} onKeyDown={e=>{if(e.key==="Enter")e.target.blur();}} style={{width:70,padding:"4px 6px",borderRadius:6,border:"1px solid var(--border)",fontSize:12,textAlign:"right",background:o.prepayment>=o.total&&o.total>0?"var(--green-light)":"#fff"}}/>{o.prepayment>0&&o.prepayment<o.total&&<div style={{fontSize:9,color:"var(--gold)",marginTop:2}}>{"зал "}{fmt(o.total-(o.prepayment||0))}</div>}{o.prepayment>=o.total&&o.total>0&&<div style={{fontSize:9,color:"var(--green)",fontWeight:700,marginTop:2}}>ОПЛАЧ</div>}</td>
          <td>{o.ttn?<div><span className="ttn-value" onClick={()=>{navigator.clipboard.writeText(o.ttn).catch(()=>{})}} title="Копіювати">{o.ttn}</span><TTNStatus ttn={o.ttn} orderId={o.id} orderStatus={o.status} onAutoStatus={(id,st)=>updSt(id,st)} onStatusCode={(id,code)=>updNpCode(id,code)}/></div>:o.deliveryType==="np"?<span style={{fontSize:11,color:"var(--text2)"}}>{"—"}</span>:"—"}</td>
          <td><select value={o.status} onChange={e=>updSt(o.id,e.target.value)} style={{padding:"4px 6px",borderRadius:6,border:"1px solid var(--border)",fontSize:11,fontWeight:600,cursor:"pointer",background:"#fff"}}>{Object.entries(STATUSES).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></td>
          <td><div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
            {o.deliveryType==="np"&&!o.ttn&&<button className="btn btn-np btn-xs" onClick={()=>setCreateTTNOrder(o)} title="Створити ТТН через НП">{I.send}</button>}
            {o.deliveryType==="np"&&o.ttn&&<button className="btn btn-np btn-xs" onClick={()=>openTtn(o)}>ТТН</button>}
            <button className="btn btn-secondary btn-xs" onClick={()=>openEdit(o)}>{I.edit}</button>
          </div></td>
        </tr>);})}
      </tbody></table>
    </div>
    {/* Mobile cards */}
    <div className="mob-orders-feed">
      {sorted.map(o=>{const dupe=dupeMap.get(o.id);const canSel=o.deliveryType==="np"&&!o.ttn;return(
        <div key={o.id} className={`mob-order-card${dupe?' dupe-highlight':''}`} style={selectedIds.has(o.id)?{outline:"2px solid var(--np-red)",background:"#fce7f3"}:null} onClick={()=>openEdit(o)}>
          <div className="mob-oc-top">
            <div className="mob-oc-name" style={{display:"flex",alignItems:"center",gap:8}}>{canSel&&<input type="checkbox" checked={selectedIds.has(o.id)} onClick={e=>e.stopPropagation()} onChange={()=>toggleSelect(o.id)} style={{cursor:"pointer",width:18,height:18}}/>}{o.client||"Без імені"}{dupe&&<span style={{background:"var(--red)",color:"#fff",fontSize:9,padding:"1px 5px",borderRadius:6,fontWeight:700,verticalAlign:"middle"}}>ДУБЛЬ</span>}</div>
            <div className="mob-oc-badge"><span className={`badge ${STCLS[o.status]}`}>{STATUSES[o.status]}</span></div>
          </div>
          <div className="mob-oc-info">
            <span>{new Date(o.date).toLocaleDateString("uk-UA",{day:"numeric",month:"short"})}</span>
            {o.phone&&<span>{o.phone}</span>}
            {o.deliveryType==="np"?<span>{o.city}{o.npBranch?` №${o.npBranch}`:""}</span>:<span style={{color:"var(--pink2)"}}>Студія</span>}
            {o.deliveryType==="np"&&<span className="badge badge-blue" style={{fontSize:9}}>Контр</span>}
          </div>
          <div className="mob-oc-items">{o.items.map(i=>`${i.name} ×${i.qty}`).join(", ")}</div>
          {o.ttn&&<div style={{fontSize:11,marginBottom:6,display:"flex",alignItems:"center",gap:6}}><span className="ttn-value" onClick={e=>{e.stopPropagation();navigator.clipboard.writeText(o.ttn).catch(()=>{})}}>{o.ttn}</span><TTNStatus ttn={o.ttn} orderId={o.id} orderStatus={o.status} onAutoStatus={(id,st)=>updSt(id,st)} onStatusCode={(id,code)=>updNpCode(id,code)}/></div>}
          {o.comment&&<div style={{fontSize:11,color:"var(--text2)",marginBottom:6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.comment}</div>}
          <div className="mob-oc-bottom">
            <div><span className="mob-oc-total">{fmt(o.total)}</span>{o.prepayment>0&&<span style={{fontSize:10,color:"var(--green)",marginLeft:6}}>передопл {fmt(o.prepayment)}</span>}{o.prepayment>0&&o.prepayment<o.total&&<span style={{fontSize:10,color:"var(--gold)",marginLeft:4}}>зал {fmt(o.total-(o.prepayment||0))}</span>}{o.prepayment>=o.total&&<span style={{fontSize:10,color:"var(--green)",marginLeft:4,fontWeight:700}}>ОПЛАЧ</span>}</div>
            <div className="mob-oc-actions" onClick={e=>e.stopPropagation()}>
              <button className="btn btn-gold" style={{padding:"5px 10px",fontSize:11}} onClick={()=>openPrepay(o)}>₴ Передопл</button>
              {o.deliveryType==="np"&&!o.ttn&&<button className="btn btn-np" style={{padding:"6px 12px",fontSize:11,fontWeight:700}} onClick={()=>setCreateTTNOrder(o)}>ТТН</button>}
              {o.deliveryType==="np"&&o.ttn&&o.status==="toSend"&&<button className="btn btn-secondary" style={{padding:"5px 10px",fontSize:11}} onClick={()=>updSt(o.id,"shipped")}>Відпр</button>}
              {o.status==="shipped"&&<button className="btn btn-secondary" style={{padding:"5px 10px",fontSize:11}} onClick={()=>updSt(o.id,"delivered")}>Дост</button>}
            </div>
          </div>
        </div>
      );})}
    </div>
    </>}
    {/* TTN Modal */}
    {ttnM&&<Modal title="ТТН — Нова Пошта" onClose={()=>setTtnM(null)}>
      <div style={{background:"var(--np-light)",borderRadius:10,padding:12,marginBottom:14,fontSize:13}}>
        <div><strong>Клієнт:</strong> {ttnM.client}</div>
        <div><strong>Тел:</strong> {ttnM.phone||"—"}</div>
        <div><strong>Місто:</strong> {ttnM.city||"—"}</div>
        <div><strong>Відділ:</strong> {ttnM.npBranch?`№${ttnM.npBranch}`:"—"}</div>
        <div><strong>Оплата:</strong> Контроль оплати</div>
      </div>
      <div style={{fontSize:12,color:"var(--text2)",marginBottom:10}}>Товари: {ttnM.items.map(i=>`${i.name} ×${i.qty}`).join(", ")}</div>
      <div className="form-group"><label className="form-label">Номер ТТН</label><input className="form-input" placeholder="59000000000000" value={ttnV} onChange={e=>setTtnV(e.target.value)} style={{fontFamily:"monospace",fontSize:16,letterSpacing:1}}/></div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button className="btn btn-secondary" onClick={()=>setTtnM(null)}>Скасувати</button><button className="btn btn-np" onClick={saveTtn}>{I.truck} Зберегти</button></div>
    </Modal>}
    {/* Quick Prepayment Modal */}
    {prepayO&&<Modal title="Передоплата" onClose={()=>setPrepayO(null)}>
      <div style={{background:"var(--gold-light)",borderRadius:10,padding:12,marginBottom:14,fontSize:13}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontWeight:700}}>{prepayO.client}</span><span style={{color:"var(--text2)"}}>{prepayO.phone}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>Сума замовлення: <strong>{fmt(prepayO.total)}</strong></span>
          <span className={`badge ${STCLS[prepayO.status]}`}>{STATUSES[prepayO.status]}</span>
        </div>
        {prepayO.items&&<div style={{fontSize:11,color:"var(--text2)",marginTop:4}}>{prepayO.items.map(i=>`${i.name} ×${i.qty}`).join(", ")}</div>}
      </div>
      <div className="form-group">
        <label className="form-label">Сума передоплати</label>
        <input className="form-input" type="number" min="0" placeholder="0" value={prepayV} onChange={e=>setPrepayV(e.target.value)} style={{fontSize:18,fontWeight:700,textAlign:"center"}} autoFocus onKeyDown={e=>e.key==="Enter"&&savePrepay()}/>
      </div>
      {Number(prepayV)>0&&<div style={{background:"var(--green-light)",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:13,display:"flex",justifyContent:"space-between"}}>
        <span>Залишок до сплати (контроль):</span>
        <strong style={{color:"var(--gold)"}}>{fmt(Math.max(0,prepayO.total-Number(prepayV)))}</strong>
      </div>}
      {Number(prepayV)>=prepayO.total&&<div style={{background:"var(--green-light)",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:13,fontWeight:700,color:"var(--green)",textAlign:"center"}}>
        Повна оплата
      </div>}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        {prepayO.prepayment>0&&<button className="btn btn-danger" onClick={()=>{setPrepayV("0");}} style={{marginRight:"auto"}}>Скинути</button>}
        <button className="btn btn-secondary" onClick={()=>setPrepayO(null)}>Скасувати</button>
        <button className="btn btn-gold" onClick={savePrepay} style={{padding:"8px 20px",fontSize:14}}>Зберегти</button>
      </div>
    </Modal>}
    {/* Edit Order Modal */}
    {editO&&<Modal title="Редагувати замовлення" onClose={()=>setEditO(null)} wide>
      {/* TTN result banner */}
      {ttnResult&&<div style={{background:"var(--green-light)",border:"1px solid var(--green)",borderRadius:10,padding:"12px 14px",marginBottom:14,textAlign:"center"}}>
        <div style={{fontSize:16,fontWeight:800,color:"var(--green)",marginBottom:4}}>{"ТТН створено!"}</div>
        <div style={{fontSize:22,fontWeight:800,color:"var(--np-red)",background:"#fff",padding:"8px 16px",borderRadius:10,display:"inline-block"}}>{ttnResult.ttn}</div>
        {ttnResult.estimated&&<div style={{marginTop:4,fontSize:11,color:"var(--text2)"}}>{"Доставка: "}{ttnResult.estimated}</div>}
        {ttnResult.cost&&<div style={{fontSize:11,color:"var(--text2)"}}>{"Вартість: "}{ttnResult.cost}{" грн"}</div>}
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        <div className="form-group" style={{marginBottom:0}}><label className="form-label">Клієнт</label><input className="form-input" value={editO.client} onChange={e=>setEditO({...editO,client:e.target.value})}/></div>
        <div className="form-group" style={{marginBottom:0}}><label className="form-label">Телефон</label><input className="form-input" value={editO.phone} onChange={e=>setEditO({...editO,phone:e.target.value})}/></div>
        {editO.deliveryType==="np"&&<>
          <div className="form-group" style={{marginBottom:0}}><label className="form-label">Місто</label><input className="form-input" value={editO.city} onChange={e=>setEditO({...editO,city:e.target.value})}/></div>
          <div className="form-group" style={{marginBottom:0}}><label className="form-label">№ відділення</label><input className="form-input" value={editO.npBranch} onChange={e=>setEditO({...editO,npBranch:e.target.value})}/></div>
          <div className="form-group" style={{marginBottom:0}}><label className="form-label">Оплата</label><select className="form-input" value={editO.payment} onChange={e=>setEditO({...editO,payment:e.target.value})}><option value="control">Контроль оплати</option></select></div>
          <div className="form-group" style={{marginBottom:0}}><label className="form-label">ТТН</label><input className="form-input" value={editO.ttn||""} onChange={e=>setEditO({...editO,ttn:e.target.value})} style={{fontFamily:"monospace"}}/></div>
        </>}
        <div className="form-group" style={{marginBottom:0}}><label className="form-label">Статус</label><select className="form-input" value={editO.status} onChange={e=>setEditO({...editO,status:e.target.value})}>
          {Object.entries(STATUSES).map(([k,v])=><option key={k} value={k}>{v}</option>)}
        </select></div>
        <div className="form-group" style={{marginBottom:0}}><label className="form-label">Коментар</label><input className="form-input" value={editO.comment||""} onChange={e=>setEditO({...editO,comment:e.target.value})}/></div>
      </div>
      {/* Prepayment & COD editing */}
      <div style={{background:"var(--pink-pale)",borderRadius:10,padding:"10px 12px",marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--text2)",marginBottom:8}}>Контроль оплати</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          <div className="form-group" style={{marginBottom:0}}><label className="form-label" style={{fontSize:10,color:"var(--green)",fontWeight:700}}>Передоплата ₴</label><input className="form-input" type="number" placeholder="0" value={editO.prepayment!=null?editO.prepayment:""} onChange={e=>{const v=e.target.value;const p=v!==""?Number(v):null;const total=editItems.reduce((s,i)=>s+i.price*i.qty,0);const cod=p!=null?Math.max(0,total-p):editO.codAmount;setEditO({...editO,prepayment:p,codAmount:cod});}} style={{fontSize:13,borderColor:"var(--green)"}}/></div>
          <div className="form-group" style={{marginBottom:0}}><label className="form-label" style={{fontSize:10,color:"var(--blue)",fontWeight:700}}>До сплати ₴</label><input className="form-input" type="number" placeholder="0" value={editO.codAmount!=null?editO.codAmount:""} onChange={e=>{const v=e.target.value;setEditO({...editO,codAmount:v!==""?Number(v):null});}} style={{fontSize:13,borderColor:"var(--gold)"}}/></div>
          <div style={{display:"flex",alignItems:"flex-end",paddingBottom:2}}>
            {(()=>{const t=editItems.reduce((s,i)=>s+i.price*i.qty,0);const p=editO.prepayment||0;const c=editO.codAmount!=null?editO.codAmount:0;const isPaid=p>=t&&t>0;return isPaid?<span className="badge badge-green" style={{fontSize:11,padding:"5px 10px"}}>Оплачено ✅</span>:<span style={{fontSize:12,color:"var(--blue)",fontWeight:700}}>До сплати: {fmt(c)}₴</span>;})()}
          </div>
        </div>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--text2)",marginBottom:6}}>Товари</div>
        {editItems.map((it,idx)=><div key={idx} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 0",borderBottom:"1px solid var(--border)",fontSize:13,flexWrap:"wrap"}}>
          <span style={{flex:"1 1 100%",fontWeight:500,marginBottom:4}}>{it.name}</span>
          <span style={{fontSize:11,color:"var(--text2)"}}>К-сть:</span>
          <input type="number" min="1" value={it.qty} onChange={e=>updEditItem(idx,"qty",Math.max(1,Number(e.target.value)))} style={{width:52,padding:"6px 8px",borderRadius:6,border:"1px solid var(--border)",fontSize:13,textAlign:"center"}}/>
          <span style={{fontSize:11,color:"var(--text2)"}}>Ціна:</span>
          <input type="number" min="0" value={it.price} onChange={e=>updEditItem(idx,"price",Math.max(0,Number(e.target.value)))} style={{width:80,padding:"6px 8px",borderRadius:6,border:"1px solid var(--border)",fontSize:13,textAlign:"right"}}/>
          <span style={{fontWeight:700,fontSize:13}}>{fmt(it.price*it.qty)}</span>
          <button className="btn btn-danger btn-xs" style={{padding:"5px 8px"}} onClick={()=>rmEditItem(idx)}>{I.trash}</button>
        </div>)}
        {/* Add product */}
        <div style={{display:"flex",gap:6,alignItems:"flex-end",padding:"10px 0",borderTop:"1px dashed var(--border)",flexWrap:"wrap"}}>
          <div style={{flex:"1 1 140px"}}><label style={{fontSize:10,fontWeight:700,color:"var(--text2)"}}>Додати товар</label><select className="form-input" value={addProdId} onChange={e=>{setAddProdId(e.target.value);const p=products.find(x=>x.id===Number(e.target.value));if(p)setAddProdPrice(String(p.price));}} style={{fontSize:12,padding:"6px 8px"}}><option value="">Обрати...</option>{products.filter(p=>p.type==="product").map(p=><option key={p.id} value={p.id}>{p.name} ({fmt(p.price)})</option>)}</select></div>
          <div style={{width:52}}><label style={{fontSize:10,fontWeight:700,color:"var(--text2)"}}>К-сть</label><input type="number" min="1" value={addProdQty} onChange={e=>setAddProdQty(Math.max(1,Number(e.target.value)))} style={{width:52,padding:"6px 8px",borderRadius:6,border:"1px solid var(--border)",fontSize:12,textAlign:"center"}}/></div>
          <div style={{width:72}}><label style={{fontSize:10,fontWeight:700,color:"var(--text2)"}}>Ціна</label><input type="number" min="0" value={addProdPrice} onChange={e=>setAddProdPrice(e.target.value)} style={{width:72,padding:"6px 8px",borderRadius:6,border:"1px solid var(--border)",fontSize:12,textAlign:"right"}}/></div>
          <button className="btn btn-primary btn-xs" onClick={addEditItem} disabled={!addProdId} style={{padding:"7px 12px",fontSize:12,whiteSpace:"nowrap"}}>+ Додати</button>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:8,paddingTop:8,borderTop:"2px solid var(--border)",fontWeight:700,fontSize:14,flexWrap:"wrap",gap:4}}>
          <span>Разом: {fmt(editItems.reduce((s,i)=>s+i.price*i.qty,0))}</span>
          <span style={{color:"var(--green)"}}>Прибуток: {fmt(editItems.reduce((s,i)=>s+(i.price-i.cost)*i.qty,0))}</span>
        </div>
      </div>
      {/* Inline TTN creation */}
      {editO.deliveryType==="np"&&!editO.ttn&&!ttnResult&&<div style={{background:"var(--np-light)",borderRadius:12,padding:"12px 14px",marginBottom:14,border:"1px solid rgba(228,30,38,.15)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:ttnSettings?10:0}}>
          <span style={{fontSize:12,fontWeight:700,color:"var(--np-red)"}}>{"НОВА ПОШТА"}</span>
          <button onClick={()=>setTtnSettings(!ttnSettings)} style={{background:"none",border:"none",fontSize:11,color:"var(--text2)",cursor:"pointer",textDecoration:"underline"}}>{ttnSettings?"Сховати":"Налаштування відправки"}</button>
        </div>
        {ttnSettings&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <div className="form-group" style={{marginBottom:0}}><label className="form-label" style={{fontSize:10}}>{"Платник доставки"}</label><select className="form-input" value={ttnPayerDel} onChange={e=>setTtnPayerDel(e.target.value)} style={{fontSize:12}}><option value="Recipient">Отримувач</option><option value="Sender">Відправник</option></select></div>
          <div className="form-group" style={{marginBottom:0}}><label className="form-label" style={{fontSize:10}}>{"Вага (кг)"}</label><input className="form-input" value={ttnWeight} onChange={e=>setTtnWeight(e.target.value)} style={{fontSize:12}}/></div>
          <div className="form-group" style={{marginBottom:0,gridColumn:"1/-1"}}>
            <label className="form-label" style={{fontSize:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>{"Опис вмісту — макс 99 символів"}</span>
              <span style={{color:ttnDesc.length>99?"var(--red)":"var(--text2)",fontWeight:700}}>{ttnDesc.length}{"/99"}</span>
            </label>
            <input className="form-input" value={ttnDesc} onChange={e=>setTtnDesc(e.target.value)} style={{fontSize:12,borderColor:ttnDesc.length>99?"var(--red)":undefined}}/>
          </div>
        </div>}
        {ttnErr&&<div style={{color:"var(--red)",fontSize:12,fontWeight:600,marginBottom:8}}>{ttnErr}</div>}
        {ttnSenderLoading&&<div style={{fontSize:11,color:"var(--text2)",marginBottom:6}}>{"Завантаження відправника..."}</div>}
        <button className="btn btn-np" onClick={doInlineTTN} disabled={ttnCreating||ttnSenderLoading} style={{width:"100%",padding:"10px",fontSize:14,fontWeight:700}}>{ttnCreating?"Створюю ТТН...":"Оформити ТТН"}</button>
      </div>}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",flexWrap:"wrap"}}>
        <button className="btn btn-danger" onClick={()=>{if(confirm("Видалити замовлення?")){DB.remove("orders",editO.id);setOrders(orders.filter(o=>o.id!==editO.id));setEditO(null);}}}>Видалити</button>
        <button className="btn btn-secondary" onClick={()=>setEditO(null)}>Скасувати</button>
        <button className="btn btn-primary" style={{padding:"8px 20px",fontSize:13}} onClick={saveEdit}>Зберегти</button>
      </div>
    </Modal>}
    {createTTNOrder&&<CreateTTNModal order={createTTNOrder} onClose={()=>setCreateTTNOrder(null)} onCreated={ttn=>{setOrders(orders.map(o=>o.id===createTTNOrder.id?{...o,ttn,status:"toSend"}:o));saveOrderField(createTTNOrder.id,{ttn,status:"toSend"});setCreateTTNOrder(null);}}/>}
    {bulkResults&&<Modal title="Масове створення ТТН" onClose={()=>{if(!bulkRunning)setBulkResults(null);}} wide>
      <div style={{marginBottom:10,fontSize:13,fontWeight:600}}>{"Прогрес: "}<span style={{color:"var(--np-red)"}}>{bulkResults.done.length}</span>{" / "+bulkResults.total}{bulkRunning?" ⟳":""}</div>
      <div style={{maxHeight:400,overflowY:"auto",border:"1px solid var(--border)",borderRadius:8}}>
        {bulkResults.done.map((r,i)=><div key={i} style={{padding:"8px 12px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,fontSize:12,background:r.ok?"var(--green-light)":"#fee2e2"}}>
          <span style={{fontWeight:600}}>{r.client}</span>
          {r.ok?<span style={{color:"var(--green)",fontWeight:700,fontFamily:"monospace"}}>{"✓ "+r.ttn}</span>:<span style={{color:"var(--red)",fontSize:11}}>{"✗ "+r.err}</span>}
        </div>)}
      </div>
      <div style={{marginTop:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:11,color:"var(--text2)"}}>{bulkRunning?"Обробка триває — не закривайте вікно":"Готово. Замовлення з успішними ТТН переведено в статус \"ТТН\"."}</div>
        {!bulkRunning&&<button className="btn btn-primary" onClick={()=>setBulkResults(null)}>{"Закрити"}</button>}
      </div>
    </Modal>}
  </div>);
}

// ─── ADMIN ───
function AdminPage({products,setProducts}){
  const[filter,setFilter]=useState("Все");
  const[showM,setShowM]=useState(false);
  const[editP,setEditP]=useState(null);
  const[form,setForm]=useState({name:"",sku:"",category:"Стрижки",cost:"",price:"",stock:"",type:"service",photo:"",version:"oversize"});
  const filtered=filter==="Все"?products:products.filter(p=>p.category===filter);

  const openNew=()=>{setEditP(null);setForm({name:"",sku:"",category:"Стрижки",cost:"",price:"",stock:"999",type:"service",photo:"",version:"oversize"});setShowM(true);};
  const openEdit=p=>{setEditP(p);setForm({name:p.name,sku:p.sku,category:p.category,cost:String(p.cost),price:String(p.price),stock:String(p.stock),type:p.type,photo:p.photo||"",version:p.version||"oversize"});setShowM(true);};
  const catChange=c=>setForm({...form,category:c,type:c==="Стрижки"?"service":"product",stock:c==="Стрижки"?"999":form.stock});
  const handlePhoto=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>setForm({...form,photo:ev.target.result});
    reader.readAsDataURL(file);
  };
  const save=()=>{
    if(!form.name){alert("Вкажіть назву");return;}
    const data={...form,cost:Number(form.cost)||0,price:Number(form.price)||0,stock:Number(form.stock)||0};
    if(editP)setProducts(products.map(p=>p.id===editP.id?{...p,...data}:p));
    else setProducts([...products,{...data,id:Date.now()}]);
    setShowM(false);
  };
  const remove=id=>{if(confirm("Видалити?")){DB.remove("products",id);setProducts(products.filter(p=>p.id!==id));}};

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
      <div className="filter-pills">{CATEGORIES.map(c=><button key={c} className={`filter-pill${filter===c?' active':''}`} onClick={()=>setFilter(c)}>{c}</button>)}</div>
      <button className="btn btn-primary" onClick={openNew}>{I.plus} Додати</button>
    </div>
    <div className="card" style={{padding:0,overflowX:"auto"}}>
      <table className="tbl"><thead><tr><th style={{width:44}}></th><th>Назва</th><th>SKU</th><th>Кат.</th><th>Версія</th><th>Собів.</th><th>Ціна</th><th>Зал.</th><th>Маржа</th><th style={{width:80}}></th></tr></thead><tbody>
        {filtered.map(p=><tr key={p.id}>
          <td>{p.photo?<img className="prod-photo" src={p.photo}/>:<div className="prod-photo-placeholder">{p.category==="Стрижки"?"\u2702":"\uD83D\uDCE6"}</div>}</td>
          <td style={{fontWeight:600}}>{p.name}</td>
          <td><code style={{fontSize:11,color:"var(--text2)"}}>{p.sku}</code></td>
          <td><span className={"badge "+(p.version==="long"?"badge-blue":"badge-amber")} style={{fontSize:10}}>{p.version==="long"?"Лонг":"Оверсайз"}</span></td><td><span className={`badge ${p.category==='Стрижки'?'badge-pink':p.category==='Косметика'?'badge-green':'badge-amber'}`}>{p.category}</span></td>
          <td><input type="number" value={p.cost} onChange={e=>{const v=Number(e.target.value);setProducts(products.map(x=>x.id===p.id?{...x,cost:v}:x));}} style={{width:70,padding:"2px 4px",borderRadius:5,border:"1px solid var(--border)",fontSize:12,textAlign:"right",background:"transparent"}}/></td>
          <td style={{fontWeight:700}}>{fmt(p.price)}</td>
          <td>{p.type==="service"?"—":<span className={p.stock<10?'badge badge-red':p.stock<20?'badge badge-amber':''}>{p.stock}</span>}</td>
          <td><span className="badge badge-green">{Math.round((p.price-p.cost)/p.price*100)}%</span></td>
          <td><div style={{display:"flex",gap:3}}><button className="btn btn-secondary btn-xs" onClick={()=>openEdit(p)}>{I.edit}</button><button className="btn btn-danger btn-xs" onClick={()=>remove(p.id)}>{I.trash}</button></div></td>
        </tr>)}
      </tbody></table>
    </div>
    {showM&&<Modal title={editP?"Редагувати":"Новий товар"} onClose={()=>setShowM(false)}>
      <div style={{display:"flex",gap:14,marginBottom:12}}>
        <div className="photo-upload">{form.photo?<img src={form.photo}/>:<>{I.cam}</>}<input type="file" accept="image/*" onChange={handlePhoto}/></div>
        <div style={{flex:1}}>
          <div className="form-group"><label className="form-label">Назва</label><input className="form-input" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div className="form-group"><label className="form-label">SKU</label><input className="form-input" value={form.sku} onChange={e=>setForm({...form,sku:e.target.value})}/></div>
            <div className="form-group"><label className="form-label">Категорія</label><select className="form-input" value={form.category} onChange={e=>catChange(e.target.value)}><option>Стрижки</option><option>Косметика</option><option>Футболки</option></select></div>
            <div className="form-group"><label className="form-label">Версія</label><select className="form-input" value={form.version} onChange={e=>{const v=e.target.value;setForm({...form,version:v,price:v==="long"?"2500":form.price,cost:v==="long"?"480":form.cost});}}><option value="oversize">Оверсайз (1400)</option><option value="long">Лонг (2500)</option></select></div>
          </div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
        <div className="form-group"><label className="form-label">Собівартість ₴</label><input className="form-input" type="number" value={form.cost} onChange={e=>setForm({...form,cost:e.target.value})}/></div>
        <div className="form-group"><label className="form-label">Ціна ₴</label><input className="form-input" type="number" value={form.price} onChange={e=>setForm({...form,price:e.target.value})}/></div>

// ─── Offline queue: track tables that have unsynced local changes ───
// When supabase is offline and we write locally, mark table as dirty.
// When supabase comes online, flush the full local state of each dirty table to DB.
const PendingSync={
  get(){try{return JSON.parse(localStorage.getItem("lyh_pending_sync")||"{}");}catch{return{};}},
  mark(table){try{const p=PendingSync.get();p[table]=true;localStorage.setItem("lyh_pending_sync",JSON.stringify(p));}catch{}},
  clear(table){try{const p=PendingSync.get();delete p[table];localStorage.setItem("lyh_pending_sync",JSON.stringify(p));}catch{}},
  hasAny(){const p=PendingSync.get();return Object.keys(p).length>0;}
};

// DB helper for CRUD
const DB={
  async loadAll(table){if(!supabase)return null;const{data,error}=await supabase.from(table).select("*");if(error){console.error("DB load "+table,error);return null;}return data;},
  async upsert(table,row){if(!supabase){PendingSync.mark(table);return;}const{error}=await supabase.from(table).upsert(row,{onConflict:"id"});if(error){console.error("DB upsert "+table,error);PendingSync.mark(table);}},
  async upsertMany(table,rows){if(!rows.length)return;if(!supabase){PendingSync.mark(table);return;}const{error}=await supabase.from(table).upsert(rows,{onConflict:"id"});if(error){console.error("DB upsertMany "+table,error);PendingSync.mark(table);}},
  async remove(table,id){if(!supabase){PendingSync.mark(table);return;}const{error}=await supabase.from(table).delete().eq("id",id);if(error){console.error("DB delete "+table,error);PendingSync.mark(table);}},
};

const NP_API_KEY="4299d316a302da241c2b62cd4171765b";
const NP_API="https://api.novaposhta.ua/v2.0/json/";

const NP={
  async call(model,method,props={}){
    try{
      const r=await fetch(NP_API,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({apiKey:NP_API_KEY,modelName:model,calledMethod:method,methodProperties:props})
      });
      const j=await r.json();
      if(!j.success)console.warn("NP API error:",j.errors);
      return j;
    }catch(e){console.error("NP fetch error:",e);return{success:false,data:[],errors:[e.message]};}
  },
  // Russian/Ukrainian typos -> canonical Ukrainian form used by NP
  _ruToUa:{"киев":"київ","харьков":"харків","одесса":"одеса","львов":"львів","днепр":"дніпро","запорожье":"запоріжжя","николаев":"миколаїв","винница":"вінниця","черкассы":"черкаси","чернигов":"чернігів","тернополь":"тернопіль","ровно":"рівне","кременчуг":"кременчук","хмельницкий":"хмельницький","луцк":"луцьк","кировоград":"кропивницький","черновцы":"чернівці","ивано-франковск":"івано-франківськ","белая церковь":"біла церква","никополь":"нікополь","бердянск":"бердянськ","краматорск":"краматорськ","мариуполь":"маріуполь","мелитополь":"мелітополь","измаил":"ізмаїл","александрия":"олександрія","ахтырка":"охтирка","славянск":"словянськ","луганск":"луганськ","донецк":"донецьк","сумы":"суми","полтава":"полтава","херсон":"херсон","житомир":"житомир","бровары":"бровари","сімферополь":"сімферополь","симферополь":"сімферополь","севастополь":"севастополь","горловка":"горлівка","макеевка":"макіївка","павлоград":"павлоград","алчевск":"алчевськ","северодонецк":"сєвєродонецьк","каменец-подольский":"кам\"янець-подільський","конотоп":"конотоп","умань":"умань","шостка":"шостка","ужгород":"ужгород","борисполь":"бориспіль","ирпень":"ірпінь","буча":"буча","вышгород":"вишгород","каменское":"кам\"янське","мукачево":"мукачево","стрый":"стрий","коломыя":"коломия"},
  // Normalize user-entered city string for matching and search
  _normCity(s){
    if(!s)return"";
    let r=String(s).toLowerCase()
      .replace(/[\u2019\u02bc\u0060\u00b4]/g,"'")
      .replace(/ё/g,"е")
      .replace(/^\s*(м\.|с\.|смт\.?|пгт\.?|місто|село|пос\.|п\.)\s*/i,"")
      .replace(/,.*$/,"")
      .replace(/\s+(область|обл\.|район|р-н)[^,]*/i,"")
      .replace(/\s+україна$/i,"")
      .trim();
    if(NP._ruToUa[r])r=NP._ruToUa[r];
    return r;
  },
  async _callSearch(q){
    if(!q||q.length<2)return[];
    const r=await NP.call("Address","searchSettlements",{CityName:q,Limit:"20"});
    if(!r.success||!r.data||!r.data[0])return[];
    return(r.data[0].Addresses||[]).map(a=>({ref:a.Ref,deliveryCityRef:a.DeliveryCity||a.Ref,name:a.Present,city:a.MainDescription,area:a.Area,region:a.Region,settlementType:a.SettlementTypeCode||""}));
  },
  async searchCity(q){
    if(!q||q.length<2)return[];
    // Try multiple variants: original, normalized (prefix/region stripped + RU->UA), just first word
    const tried=new Set();
    const variants=[q, NP._normCity(q)];
    const firstWord=(NP._normCity(q)||q).split(/\s+/)[0];
    if(firstWord&&firstWord.length>=2)variants.push(firstWord);
    let best=[];
    for(const v of variants){
      const key=v.toLowerCase().trim();
      if(!key||tried.has(key))continue;
      tried.add(key);
      const res=await NP._callSearch(v);
      if(res.length){best=res;break;}
    }
    return best;
  },
  async getWarehouses(cityRef,q=""){
    if(!cityRef)return[];
    const base={Limit:"50"};
    if(q)base.FindByString=q;
    // try SettlementRef first (works for most cases)
    let r=await NP.call("Address","getWarehouses",{...base,SettlementRef:cityRef});
    let arr=r.success&&Array.isArray(r.data)?r.data:[];
    // fallback: try CityRef (needed for postomats in some cases)
    if(!arr.length){
      r=await NP.call("Address","getWarehouses",{...base,CityRef:cityRef});
      arr=r.success&&Array.isArray(r.data)?r.data:[];
    }
    return arr.map(w=>({ref:w.Ref,num:w.Number,desc:w.Description,shortAddr:w.ShortAddress,type:w.TypeOfWarehouse,cityDesc:w.CityDescription}));
  },
  async trackTTN(ttn){
    if(!ttn)return null;
    const r=await NP.call("TrackingDocument","getStatusDocuments",{Documents:[{DocumentNumber:ttn}]});
    if(!r.success||!r.data||!r.data[0])return null;
    const d=r.data[0];
    return{status:d.Status,statusCode:d.StatusCode,city:d.CitySender+" → "+d.CityRecipient,weight:d.DocumentWeight,cost:d.DocumentCost,deliveryCost:d.CostOnSite,scheduledDate:d.ScheduledDeliveryDate,actualDate:d.ActualDeliveryDate,warehouseRecipient:d.WarehouseRecipient,redeliverySum:d.RedeliverySum};
  },
  // Bulk track up to 100 TTNs per call. Returns [{ttn, statusCode, status}, ...] (successful rows only).
  async trackTTNs(ttns){
    const out=[];
    const list=(ttns||[]).filter(Boolean);
    for(let i=0;i<list.length;i+=100){
      const chunk=list.slice(i,i+100);
      const r=await NP.call("TrackingDocument","getStatusDocuments",{Documents:chunk.map(t=>({DocumentNumber:t}))});
      if(r&&r.success&&Array.isArray(r.data)){
        for(const d of r.data){
          if(d&&d.Number)out.push({ttn:String(d.Number),statusCode:String(d.StatusCode||""),status:d.Status||"",scheduledDate:d.ScheduledDeliveryDate||"",redeliverySum:d.RedeliverySum||0});
        }
      }
    }
    return out;
  },
  async calcDeliveryCost(citySenderRef,cityRecipientRef,weight,cost,seatsAmount=1){
    const r=await NP.call("InternetDocument","getDocumentPrice",{
      CitySender:citySenderRef,CityRecipient:cityRecipientRef,
      Weight:String(weight||0.5),ServiceType:"WarehouseWarehouse",
      Cost:String(cost||300),CargoType:"Parcel",SeatsAmount:String(seatsAmount)
    });
    if(!r.success||!r.data||!r.data[0])return null;
    return{cost:r.data[0].Cost,assessedCost:r.data[0].AssessedCost};
  },
  async createTTN(params){
    const r=await NP.call("InternetDocument","save",params);
    if(!r.success)return{ok:false,errors:r.errors};
    return{ok:true,ttn:r.data[0]?.IntDocNumber,ref:r.data[0]?.Ref,cost:r.data[0]?.CostOnSite,estimated:r.data[0]?.EstimatedDeliveryDate};
  },
  // Cache for CargoDescription ref lookup (НП категорія вантажу, напр. "Одяг")
  _cargoRefCache:null,
  async getCargoDescriptionRef(prefer){
    // Returns the Ref for a category matching `prefer` (case-insensitive substring of Description),
    // or the first "Одяг"/"Apparel" category, or the first in the list.
    if(!NP._cargoRefCache){
      try{
        const r=await NP.call("Common","getCargoDescription",{});
        NP._cargoRefCache=(r.success&&Array.isArray(r.data))?r.data:[];
      }catch(e){NP._cargoRefCache=[];}
    }
    const list=NP._cargoRefCache||[];
    if(!list.length)return "";
    const q=(prefer||"").toLowerCase();
    const match=q?list.find(x=>((x.Description||"").toLowerCase().includes(q))||((x.DescriptionRu||"").toLowerCase().includes(q))):null;
    if(match&&match.Ref)return match.Ref;
    const clothes=list.find(x=>/од[ея]г|apparel|cloth/i.test((x.Description||"")+" "+(x.DescriptionRu||"")));
    if(clothes&&clothes.Ref)return clothes.Ref;
    return list[0]?.Ref||"";
  },
  async getSenderInfo(){
    const r=await NP.call("Counterparty","getCounterparties",{CounterpartyProperty:"Sender",Page:"1"});
    if(!r.success||!r.data||!r.data[0])return null;
    const sender=r.data[0];
    // Get sender contact
    const c=await NP.call("Counterparty","getCounterpartyContactPersons",{Ref:sender.Ref,Page:"1"});
    const contact=c.success&&c.data&&c.data[0]?c.data[0]:null;
    // Get sender addresses
    const a=await NP.call("Counterparty","getCounterpartyAddresses",{Ref:sender.Ref,CounterpartyProperty:"Sender"});
    const addr=a.success&&a.data&&a.data[0]?a.data[0]:null;
    return{ref:sender.Ref,contact:contact?{ref:contact.Ref,name:contact.Description,phone:contact.Phones}:null,address:addr?{ref:addr.Ref,desc:addr.Description,cityRef:addr.CityRef}:null};
  },
  async createRecipient(fullName,phone,cityRef){
    // NP allows only Cyrillic letters, space, hyphen, apostrophe in name fields.
    // Sanitize and take at most 3 tokens — extra tokens (product names, numbers) are ignored.
    const sanitize=s=>(s||"").replace(/[^\u0400-\u04FF\s\-'\u2019]/g," ").replace(/\s+/g," ").trim();
    const parts=sanitize(fullName).split(/\s+/).filter(Boolean);
    const lastName=parts[0]||"Клієнт";
    const firstName=parts[1]||".";
    const middleName=parts[2]||"";
    // Save recipient counterparty
    const payload={
      FirstName:firstName,LastName:lastName,
      Phone:phone,CounterpartyType:"PrivatePerson",CounterpartyProperty:"Recipient",CityRef:cityRef
    };
    if(middleName)payload.MiddleName=middleName;
    const r=await NP.call("Counterparty","save",payload);
    if(!r.success||!r.data||!r.data[0])return{ok:false,errors:r.errors||["Не вдалося створити отримувача"]};
    const cp=r.data[0];
    // Get contact person ref
    let contactRef=cp.ContactPerson?.data?.[0]?.Ref||"";
    if(!contactRef){
      const c=await NP.call("Counterparty","getCounterpartyContactPersons",{Ref:cp.Ref,Page:"1"});
      if(c.success&&c.data&&c.data[0])contactRef=c.data[0].Ref;
    }
    return{ok:true,ref:cp.Ref,contactRef};
  }
};


// ─── NP resolution + TTN helpers (async, used by parser-driven flows) ───
function pickNPCity(cities,query){
  if(!cities||!cities.length)return null;
  var want=NP._normCity(query);
  var exact=cities.find(function(c){return NP._normCity(c.city||'')===want||NP._normCity(c.name||'')===want;});
  if(exact)return exact;
  var starts=cities.find(function(c){return NP._normCity(c.city||'').startsWith(want)||NP._normCity(c.name||'').startsWith(want);});
  if(starts)return starts;
  return cities[0];
}
function pickNPWarehouse(whs,branchNum){
  if(!whs||!whs.length)return null;
  var exact=whs.find(function(w){return String(w.num)===String(branchNum);});
  if(exact)return exact;
  var sub=whs.find(function(w){return String(w.num).indexOf(String(branchNum))!==-1||String(w.desc||'').indexOf('№'+branchNum)!==-1;});
  return sub||null;
}
async function resolveNP(parsed){
  var base={cityRef:'',deliveryCityRef:'',warehouseRef:'',cityCanonical:'',warehouseDesc:'',cityCandidates:0,whCandidates:0,npResolveErr:''};
  if(!parsed||!parsed.city)return Object.assign({},parsed||{},base,{npResolveErr:'no city'});
  try{
    var cities=await NP.searchCity(parsed.city);
    if(!cities.length)return Object.assign({},parsed,base,{npResolveErr:'city not found'});
    var city=pickNPCity(cities,parsed.city);
    var warehouseRef='',warehouseDesc='',whCandidates=0;
    if(parsed.npBranch){
      var whs=await NP.getWarehouses(city.ref,parsed.npBranch);
      if(!whs.length)whs=await NP.getWarehouses(city.ref);
      whCandidates=whs.length;
      var wh=pickNPWarehouse(whs,parsed.npBranch);
      if(wh){warehouseRef=wh.ref;warehouseDesc=wh.desc;}
    }
    return Object.assign({},parsed,{cityRef:city.ref,deliveryCityRef:city.deliveryCityRef,cityCanonical:city.name||city.city,warehouseRef:warehouseRef,warehouseDesc:warehouseDesc,cityCandidates:cities.length,whCandidates:whCandidates,npResolveErr:warehouseRef?'':(parsed.npBranch?'branch №'+parsed.npBranch+' not found':'no branch')});
  }catch(e){return Object.assign({},parsed,base,{npResolveErr:'NP error: '+e.message});}
}
async function createTTNFromOrder(orderLike){
  // orderLike: {name, phone, cityRef, deliveryCityRef, warehouseRef, npType, products[], prepayment, total?}
  if(!orderLike.cityRef||!orderLike.warehouseRef)return{ok:false,error:'немає cityRef або warehouseRef'};
  if(!orderLike.phone||!orderLike.name)return{ok:false,error:'немає імені або телефону'};
  var sender=await NP.getSenderInfo();
  if(!sender||!sender.ref||!sender.contact||!sender.address)return{ok:false,error:'не вдалося отримати дані відправника НП'};
  var cargoRef='';try{cargoRef=await NP.getCargoDescriptionRef('одяг');}catch(e){}
  var total=Number(orderLike.total)||(orderLike.products||[]).reduce(function(s,p){return s+(Number(p.price)||0)*(Number(p.qty)||0);},0)||300;
  var cod=Math.max(0,total-(Number(orderLike.prepayment)||0));
  var recip=await NP.createRecipient(orderLike.name,orderLike.phone,orderLike.deliveryCityRef||orderLike.cityRef);
  if(!recip.ok)return{ok:false,error:'recipient: '+JSON.stringify(recip.errors)};
  var svc=(orderLike.npType==='postomat')?'WarehousePostomat':'WarehouseWarehouse';
  var params={
    PayerType:'Recipient',PaymentMethod:'Cash',
    DateTime:new Date().toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit',year:'numeric'}),
    CargoType:'Parcel',Weight:'0.5',ServiceType:svc,SeatsAmount:'1',
    Description:'Одяг',Cost:String(total),
    CitySender:sender.address.cityRef,Sender:sender.ref,
    SenderAddress:sender.address.ref,ContactSender:sender.contact.ref,SendersPhone:sender.contact.phone,
    CityRecipient:orderLike.deliveryCityRef||orderLike.cityRef,
    Recipient:recip.ref,RecipientAddress:orderLike.warehouseRef,
    ContactRecipient:recip.contactRef,RecipientsPhone:orderLike.phone,
  };
  if(cargoRef)params.CargoDescription=cargoRef;
  if(cod>0)params.BackwardDeliveryData=[{PayerType:'Recipient',CargoType:'Money',RedeliveryString:String(cod)}];
  var r=await NP.createTTN(params);
  if(!r.ok)return{ok:false,error:JSON.stringify(r.errors)};
  return{ok:true,ttn:r.ttn,cost:r.cost,estimated:r.estimated};
}
